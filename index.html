<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Qisas-ul-Saliheen — Stories of the Righteous</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@400;600;700;800;900&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --parchment:#fdf6e3;
  --parchment2:#f5e6c8;
  --ink:#2c1810;
  --ink2:#4a3728;
  --gold:#c9942a;
  --gold2:#e8b84b;
  --teal:#1a6b6b;
  --teal2:#2a9090;
  --rose:#8b3a3a;
  --green:#2d6a4f;
  --blue:#1a4a7a;
  --muted:#7a6a5a;
  --border:#d4b896;
  --white:#fff;
  --shadow:rgba(44,24,16,0.15);
  --font-body:'Lora',Georgia,serif;
  --font-ui:'Nunito',sans-serif;
  --font-title:'Cinzel',serif;
}
html,body,#root{height:100%;margin:0}
body{font-family:var(--font-body);background:var(--parchment);color:var(--ink)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--parchment2)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes pageFlip{from{opacity:0;transform:rotateY(-8deg) translateX(-20px)}to{opacity:1;transform:rotateY(0) translateX(0)}}
@keyframes starPop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}

.fade-up{animation:fadeUp 0.5s ease forwards}
.fade-in{animation:fadeIn 0.4s ease forwards}
.page-enter{animation:pageFlip 0.5s ease forwards}

/* ===== HEADER ===== */
.header{
  background:linear-gradient(135deg,#1a2a1a 0%,#2c1810 40%,#1a2a40 100%);
  padding:0 28px;
  height:68px;
  display:flex;align-items:center;gap:16px;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
.header::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9942a' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.header-logo{font-family:var(--font-title);font-size:22px;color:var(--gold2);font-weight:700;letter-spacing:1px;position:relative}
.header-logo span{display:block;font-size:10px;color:rgba(232,184,75,0.7);font-family:var(--font-ui);font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-top:1px}
.header-crescent{font-size:28px;animation:float 4s ease-in-out infinite;filter:drop-shadow(0 0 8px rgba(201,148,42,0.5))}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.header-btn{padding:7px 16px;border-radius:20px;border:1.5px solid rgba(201,148,42,0.4);background:transparent;color:rgba(232,184,75,0.8);font-family:var(--font-ui);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
.header-btn:hover,.header-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.user-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;background:rgba(201,148,42,0.15);border:1px solid rgba(201,148,42,0.3)}
.user-badge-name{font-family:var(--font-ui);font-size:12px;font-weight:800;color:var(--gold2)}
.user-badge-icon{font-size:18px}

/* ===== LAYOUT ===== */
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.main-layout{flex:1;display:flex;overflow:hidden}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;flex-shrink:0;
  background:linear-gradient(180deg,#2c1810 0%,#1a2a2a 100%);
  display:flex;flex-direction:column;
  border-right:2px solid var(--gold);
  overflow-y:auto;
  position:relative;
}
.sidebar::after{
  content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(180deg,transparent,var(--gold2),transparent);
}
.sidebar-section{padding:20px 16px 8px}
.sidebar-section-title{
  font-family:var(--font-ui);font-size:9px;font-weight:800;
  color:rgba(201,148,42,0.6);letter-spacing:3px;text-transform:uppercase;
  padding:0 4px;margin-bottom:12px;
}
.sidebar-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:all 0.2s;
  border:1px solid transparent;
  margin-bottom:4px;
}
.sidebar-item:hover{background:rgba(201,148,42,0.12);border-color:rgba(201,148,42,0.2)}
.sidebar-item.active{background:rgba(201,148,42,0.2);border-color:rgba(201,148,42,0.4)}
.sidebar-item-icon{font-size:20px;flex-shrink:0}
.sidebar-item-text{flex:1}
.sidebar-item-name{font-family:var(--font-ui);font-size:13px;font-weight:700;color:var(--parchment);line-height:1.2}
.sidebar-item-sub{font-family:var(--font-ui);font-size:10px;color:rgba(253,246,227,0.5);font-weight:600;margin-top:1px}
.sidebar-item-badge{
  font-family:var(--font-ui);font-size:10px;font-weight:800;
  padding:2px 7px;border-radius:10px;
  background:var(--gold);color:var(--ink);
}
.sidebar-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(201,148,42,0.3),transparent);margin:8px 16px}

/* PDF Section */
.pdf-section{
  margin:12px;border-radius:12px;
  background:rgba(201,148,42,0.08);
  border:1px solid rgba(201,148,42,0.2);
  overflow:hidden;
}
.pdf-section-header{
  padding:12px 14px;
  display:flex;align-items:center;gap:8px;
  cursor:pointer;
  border-bottom:1px solid rgba(201,148,42,0.15);
}
.pdf-section-title{font-family:var(--font-ui);font-size:11px;font-weight:800;color:var(--gold2);letter-spacing:1px}
.pdf-item{
  padding:10px 14px;display:flex;align-items:center;gap:8px;
  cursor:pointer;transition:background 0.2s;border-bottom:1px solid rgba(201,148,42,0.08);
}
.pdf-item:last-child{border-bottom:none}
.pdf-item:hover{background:rgba(201,148,42,0.1)}
.pdf-item-name{font-family:var(--font-ui);font-size:11px;font-weight:700;color:rgba(253,246,227,0.8);flex:1}
.pdf-item-icon{font-size:16px}
.pdf-download-btn{
  font-family:var(--font-ui);font-size:10px;font-weight:800;
  padding:3px 8px;border-radius:6px;
  background:rgba(201,148,42,0.2);border:1px solid rgba(201,148,42,0.3);
  color:var(--gold2);cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.pdf-download-btn:hover{background:var(--gold);color:var(--ink)}

/* ===== MAIN CONTENT ===== */
.content{flex:1;overflow-y:auto;position:relative}

/* ===== AUTH SCREEN ===== */
.auth-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:24px;
  background:linear-gradient(160deg,#1a2a1a 0%,#2c1810 50%,#1a2a40 100%);
  min-height:100vh;
}
.auth-card{
  background:var(--parchment);
  border-radius:20px;padding:44px 40px;
  max-width:460px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  border:2px solid var(--gold);
  text-align:center;
  position:relative;overflow:hidden;
}
.auth-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));
}
.auth-crescent{font-size:56px;display:block;margin-bottom:16px;animation:float 4s ease-in-out infinite}
.auth-title{font-family:var(--font-title);font-size:28px;color:var(--ink);margin-bottom:4px;font-weight:700}
.auth-subtitle{font-family:var(--font-ui);font-size:13px;color:var(--muted);font-weight:600;margin-bottom:6px;font-style:italic}
.auth-arabic{font-size:22px;color:var(--gold);margin-bottom:24px;direction:rtl;font-family:serif}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:var(--parchment2);border-radius:10px;padding:3px;border:1px solid var(--border)}
.auth-tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;font-family:var(--font-ui);font-size:13px;font-weight:800;cursor:pointer;color:var(--muted);transition:all 0.2s}
.auth-tab.active{background:var(--ink);color:var(--gold2);box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.auth-field{margin-bottom:12px;text-align:left}
.auth-label{font-family:var(--font-ui);font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block}
.auth-inp{
  width:100%;padding:12px 14px;
  border:2px solid var(--border);border-radius:10px;
  font-family:var(--font-ui);font-size:14px;font-weight:700;
  color:var(--ink);background:var(--white);outline:none;
  transition:border-color 0.2s;
}
.auth-inp:focus{border-color:var(--gold)}
.auth-btn{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#2c1810,#4a3728);
  color:var(--gold2);font-family:var(--font-ui);font-size:15px;font-weight:900;
  cursor:pointer;transition:all 0.2s;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  margin-top:4px;letter-spacing:0.5px;
}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.auth-err{color:#8b3a3a;font-size:12px;font-weight:700;margin-bottom:10px;padding:8px 12px;background:#fdf2f2;border-radius:8px;border:1px solid #e8b4b4;font-family:var(--font-ui)}
.auth-type-row{display:flex;gap:10px;margin-bottom:16px}
.auth-type-btn{
  flex:1;padding:12px;border-radius:12px;
  border:2px solid var(--border);background:var(--white);
  font-family:var(--font-ui);font-size:12px;font-weight:800;
  cursor:pointer;transition:all 0.2s;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:5px;
}
.auth-type-btn.active{border-color:var(--gold);background:#fef9e7;color:var(--ink)}

/* ===== HOME / LIBRARY ===== */
.home-hero{
  background:linear-gradient(160deg,#1a2a1a 0%,#2c1810 50%,#1a2a40 100%);
  padding:48px 40px 56px;position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9942a' fill-opacity='0.05'%3E%3Cpath d='M40 0C17.9 0 0 17.9 0 40s17.9 40 40 40 40-17.9 40-40S62.1 0 40 0zm0 70C23.4 70 10 56.6 10 40S23.4 10 40 10s30 13.4 30 30-13.4 30-30 30z'/%3E%3C/g%3E%3C/svg%3E");
}
.home-hero-inner{position:relative;max-width:700px}
.home-bismillah{font-size:28px;color:var(--gold2);margin-bottom:12px;direction:rtl;font-family:serif;display:block}
.home-title{font-family:var(--font-title);font-size:42px;color:var(--parchment);font-weight:700;line-height:1.1;margin-bottom:8px}
.home-title-gold{color:var(--gold2)}
.home-subtitle{font-family:var(--font-body);font-size:16px;color:rgba(253,246,227,0.75);font-style:italic;margin-bottom:20px}
.home-stats{display:flex;gap:20px;flex-wrap:wrap}
.home-stat{
  background:rgba(201,148,42,0.15);border:1px solid rgba(201,148,42,0.3);
  border-radius:10px;padding:10px 18px;
  font-family:var(--font-ui);
}
.home-stat-num{font-size:22px;font-weight:900;color:var(--gold2)}
.home-stat-label{font-size:10px;color:rgba(253,246,227,0.6);font-weight:700;letter-spacing:1px;text-transform:uppercase}

/* Category tabs */
.category-tabs{
  display:flex;gap:8px;padding:24px 32px 0;
  overflow-x:auto;flex-wrap:nowrap;
  border-bottom:2px solid var(--border);
  background:var(--parchment);
}
.category-tabs::-webkit-scrollbar{height:0}
.cat-tab{
  padding:10px 20px;border-radius:10px 10px 0 0;
  border:2px solid transparent;border-bottom:none;
  font-family:var(--font-ui);font-size:13px;font-weight:800;
  cursor:pointer;transition:all 0.2s;color:var(--muted);
  background:transparent;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
  margin-bottom:-2px;
}
.cat-tab:hover{color:var(--ink);background:var(--parchment2)}
.cat-tab.active{
  color:var(--ink);background:var(--parchment);
  border-color:var(--border);border-bottom-color:var(--parchment);
}

/* Book grid */
.books-grid-wrap{padding:28px 32px}
.books-grid-title{
  font-family:var(--font-title);font-size:18px;color:var(--ink2);
  margin-bottom:20px;display:flex;align-items:center;gap:10px;
}
.books-grid-title::after{content:'';flex:1;height:1px;background:var(--border)}
.books-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}
.book-card{
  background:var(--white);border-radius:14px;
  border:1px solid var(--border);
  cursor:pointer;transition:all 0.25s;
  overflow:hidden;position:relative;
  box-shadow:0 2px 12px var(--shadow);
}
.book-card:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(44,24,16,0.25);border-color:var(--gold)}
.book-cover{
  height:160px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.book-cover-emoji{font-size:64px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.2))}
.book-cover-pattern{
  position:absolute;inset:0;opacity:0.15;
  background-size:30px 30px;
}
.book-card-body{padding:14px}
.book-card-category{
  font-family:var(--font-ui);font-size:9px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;
}
.book-card-title{font-family:var(--font-body);font-size:15px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:6px}
.book-card-desc{font-family:var(--font-ui);font-size:11px;color:var(--muted);font-weight:600;line-height:1.5;margin-bottom:10px}
.book-card-footer{display:flex;align-items:center;justify-content:space-between}
.book-card-chapters{font-family:var(--font-ui);font-size:10px;color:var(--muted);font-weight:700}
.book-card-progress{
  height:4px;background:var(--parchment2);border-radius:2px;margin-top:8px;
}
.book-card-progress-fill{height:100%;border-radius:2px;background:var(--gold);transition:width 0.5s ease}
.book-card-badge{
  position:absolute;top:10px;right:10px;
  font-family:var(--font-ui);font-size:9px;font-weight:800;
  padding:3px 8px;border-radius:8px;letter-spacing:1px;
}
.book-card-badge.new{background:var(--teal);color:#fff}
.book-card-badge.done{background:var(--gold);color:var(--ink)}

/* ===== BOOK READER ===== */
.reader-wrap{max-width:860px;margin:0 auto;padding:32px 32px 60px}
.reader-back{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font-ui);font-size:13px;font-weight:700;
  color:var(--muted);cursor:pointer;transition:color 0.2s;
  margin-bottom:24px;padding:6px 0;
}
.reader-back:hover{color:var(--gold)}
.reader-header{margin-bottom:32px}
.reader-category{
  font-family:var(--font-ui);font-size:10px;font-weight:800;
  letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;
}
.reader-title{font-family:var(--font-title);font-size:34px;color:var(--ink);font-weight:700;line-height:1.2;margin-bottom:10px}
.reader-meta{font-family:var(--font-ui);font-size:13px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.reader-divider{height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin:20px 0;border:none}

/* Chapter list */
.chapter-list{
  background:var(--white);border-radius:14px;
  border:1px solid var(--border);overflow:hidden;
  margin-bottom:32px;box-shadow:0 2px 12px var(--shadow);
}
.chapter-list-header{
  padding:16px 20px;
  background:linear-gradient(135deg,#2c1810,#1a2a2a);
  display:flex;align-items:center;gap:10px;
}
.chapter-list-title{font-family:var(--font-title);font-size:14px;color:var(--gold2);font-weight:600;letter-spacing:1px}
.chapter-item{
  padding:16px 20px;display:flex;align-items:center;gap:14px;
  border-bottom:1px solid var(--parchment2);cursor:pointer;
  transition:all 0.2s;
}
.chapter-item:last-child{border-bottom:none}
.chapter-item:hover{background:var(--parchment);padding-left:28px}
.chapter-item.active{background:#fef9e7;border-left:3px solid var(--gold)}
.chapter-item.done{opacity:0.8}
.chapter-num{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-ui);font-size:13px;font-weight:800;
  flex-shrink:0;
}
.chapter-num.default{background:var(--parchment2);color:var(--ink2)}
.chapter-num.done{background:var(--gold);color:var(--ink)}
.chapter-num.active{background:var(--ink);color:var(--gold2)}
.chapter-info{flex:1}
.chapter-name{font-family:var(--font-body);font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.chapter-sub{font-family:var(--font-ui);font-size:11px;color:var(--muted);font-weight:600}
.chapter-status{font-size:18px;flex-shrink:0}

/* Story content */
.story-content{
  background:var(--white);border-radius:16px;
  border:1px solid var(--border);
  box-shadow:0 4px 24px var(--shadow);
  overflow:hidden;margin-bottom:28px;
}
.story-scene{
  background:linear-gradient(160deg,#1a2a1a,#2c1810,#1a2a40);
  min-height:220px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;padding:32px;
}
.story-scene-emoji{font-size:80px;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.4));z-index:1;position:relative}
.story-scene-caption{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.6));
  padding:16px 20px 12px;
  font-family:var(--font-ui);font-size:11px;color:rgba(255,255,255,0.7);
  font-style:italic;font-weight:600;text-align:center;
}
.story-chapter-header{
  padding:20px 28px 0;
  border-bottom:1px solid var(--parchment2);
}
.story-chapter-num{
  font-family:var(--font-ui);font-size:10px;font-weight:800;
  letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;
}
.story-chapter-title{font-family:var(--font-title);font-size:22px;color:var(--ink);font-weight:600;padding-bottom:16px}
.story-body{padding:28px;font-size:16px;line-height:1.9;color:var(--ink2)}
.story-body p{margin-bottom:18px}
.story-body p:last-child{margin-bottom:0}
.story-pull-quote{
  border-left:4px solid var(--gold);
  padding:14px 20px;margin:20px 0;
  background:linear-gradient(90deg,#fef9e7,transparent);
  border-radius:0 8px 8px 0;
  font-style:italic;font-size:17px;color:var(--ink);font-weight:600;
}
.story-highlight{
  display:inline;background:linear-gradient(120deg,rgba(201,148,42,0.2) 0%,rgba(201,148,42,0.15) 100%);
  border-radius:3px;padding:1px 3px;
}

/* Lesson & Moral box */
.lesson-box{
  margin:0 28px 28px;padding:24px;
  background:linear-gradient(135deg,#1a2a1a,#2c1810);
  border-radius:14px;position:relative;overflow:hidden;
}
.lesson-box::before{
  content:'✨';position:absolute;top:16px;right:16px;font-size:24px;opacity:0.3;

// ─── Helpers ──────────────────────────────────────────────────────────────────
function getProfile(username) {
  try { return JSON.parse(localStorage.getItem('qisas_' + username)) || {}; } catch { return {}; }
}
function saveProfile(username, data) {
  localStorage.setItem('qisas_' + username, JSON.stringify(data));
}
function updateProfile(username, updates) {
  const p = getProfile(username);
  const np = { ...p, ...updates };
  saveProfile(username, np);
  return np;
}

function checkBadges(profile) {
  const earned = profile.badges || [];
  const newBadges = [];
  for (const b of BADGES) {
    if (!earned.includes(b.id) && b.check(profile)) {
      earned.push(b.id);
      newBadges.push(b);
    }
  }
  return { earned, newBadges };
}

// ─── PDF Download (text-based with pictures emoji) ────────────────────────────
function generatePDFContent(book) {
  let text = `QISAS-UL-SALIHEEN\nStories of the Righteous\n`;
  text += `${'─'.repeat(50)}\n\n`;
  text += `${book.title.toUpperCase()}\n`;
  text += `Category: ${book.categoryLabel}\n`;
  text += `Source: ${book.source}\n\n`;
  text += `${'─'.repeat(50)}\n\n`;
  for (const ch of book.chapters) {
    text += `Chapter ${ch.num}: ${ch.title}\n`;
    text += `${ch.scene} ${ch.sceneCaption}\n`;
    text += `${'─'.repeat(40)}\n\n`;
    for (const para of ch.content) {
      text += para.replace(/<[^>]+>/g, '') + '\n\n';
    }
    text += `\n🌟 What We Learned:\n`;
    for (const l of ch.learned) { text += `  • ${l}\n`; }
    text += `\n💎 Moral of the Story:\n  "${ch.moral}"\n`;
    text += `\n${'═'.repeat(50)}\n\n`;
  }
  text += `\nDownloaded from Qisas-ul-Saliheen App\nStories of the Righteous for Young Muslims`;
  return text;
}

function downloadBookPDF(book) {
  const content = generatePDFContent(book);
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = book.title.replace(/[^a-z0-9]/gi, '_') + '.txt';
  a.click();
}

}

// ─── Quiz Component ───────────────────────────────────────────────────────────
function Quiz({ questions, onComplete, title, isChapter }) {
  const [cur, setCur] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const letters = ['A','B','C','D'];

  function pick(i) {
    if (answered) return;
    setSelected(i);
    setAnswered(true);
    if (i === questions[cur].answer) setScore(s => s+1);
  }
  function next() {
    if (cur < questions.length-1) { setCur(c=>c+1); setSelected(null); setAnswered(false); }
    else setDone(true);
  }
  function finish() { onComplete(score, questions.length); }

  if (done) {
    const pct = Math.round((score/questions.length)*100);
    const great = pct >= 80;
    return (
      <div className="quiz-results">
        <div className="quiz-results-icon">{great ? '🌟' : '📖'}</div>
        <div className="quiz-results-title">{great ? 'Wonderful!' : 'Good effort!'}</div>
        <div className="quiz-results-score">{score}/{questions.length}</div>
        <div className="quiz-results-sub">{pct}% — {great ? 'You really know this story!' : 'Keep reading to improve!'}</div>
        <div className="quiz-results-btns">
          <button className="results-btn primary" onClick={finish}>Continue Reading ›</button>
          <button className="results-btn secondary" onClick={() => { setCur(0); setSelected(null); setAnswered(false); setScore(0); setDone(false); }}>Try Again</button>
        </div>
      </div>
    );
  }

  const q = questions[cur];
  return (
    <div className="quiz-wrap">
      <div className="quiz-header">
        <div className="quiz-icon">📝</div>
        <div className="quiz-header-text">
          <div className="quiz-header-title">{isChapter ? 'Chapter Quiz' : 'Final Quiz'}</div>
          <div className="quiz-header-sub">{title}</div>
          <div className="quiz-progress-bar"><div className="quiz-progress-fill" style={{width:`${((cur)/questions.length)*100}%`}}/></div>
        </div>
      </div>
      <div className="quiz-question-card">
        <div className="quiz-q-num">Question {cur+1} of {questions.length}</div>
        <div className="quiz-q-text">{q.q}</div>
        <div className="quiz-options">
          {q.options.map((opt,i) => (
            <button key={i}
              className={`quiz-option${selected===i ? ' selected' : ''}${answered && i===q.answer ? ' correct' : ''}${answered && selected===i && i!==q.answer ? ' wrong' : ''}`}
              onClick={() => pick(i)} disabled={answered}>
              <span className="quiz-option-letter">{letters[i]}</span>
              {opt}
            </button>
          ))}
        </div>
        {answered && (
          <div className={`quiz-feedback ${selected===q.answer ? 'correct' : 'wrong'}`} style={{marginTop:14}}>
            <span>{selected===q.answer ? '✅' : '❌'}</span>
            <span>{q.explain}</span>
          </div>
        )}
      </div>
      {answered && <button className="quiz-next-btn" onClick={next}>{cur<questions.length-1 ? 'Next Question →' : 'See Results'}</button>}
    </div>
  );
}

// ─── Book Reader ──────────────────────────────────────────────────────────────
function BookReader({ book, profile, username, onBack, onProfileUpdate }) {
  const [curChapter, setCurChapter] = useState(0);
  const [mode, setMode] = useState('read'); // read | quiz | final-quiz
  const [completedChapters, setCompletedChapters] = useState(
    profile.chaptersCompleted?.[book.id] || []
  );

  const ch = book.chapters[curChapter];
  const allDone = completedChapters.length >= book.chapters.length;

  useEffect(() => {
    window.scrollTo(0,0);
  }, [curChapter, mode]);

  function markChapterDone(chId) {
    if (completedChapters.includes(chId)) return;
    const nc = [...completedChapters, chId];
    setCompletedChapters(nc);
    const prev = getProfile(username);
    const booksRead = [...new Set([...(prev.booksRead||[]), book.id])];
    const chapMap = { ...(prev.chaptersCompleted||{}), [book.id]: nc };
    const booksCompleted = nc.length >= book.chapters.length
      ? [...new Set([...(prev.booksCompleted||[]), book.id])]
      : (prev.booksCompleted||[]);
    const { earned, newBadges } = checkBadges({ ...prev, booksRead, chaptersCompleted: chapMap, booksCompleted });
    const np = updateProfile(username, { booksRead, chaptersCompleted: chapMap, booksCompleted, badges: earned, lastRead: new Date().toISOString() });
    onProfileUpdate(np, newBadges);
  }

  function onChapterQuizDone(score, total) {
    const isPerfect = score === total;
    const prev = getProfile(username);
    const qDone = (prev.quizzesCompleted||0) + 1;
    const perf = isPerfect ? (prev.perfectQuizzes||0)+1 : (prev.perfectQuizzes||0);
    const { earned, newBadges } = checkBadges({ ...prev, quizzesCompleted: qDone, perfectQuizzes: perf });
    const np = updateProfile(username, { quizzesCompleted: qDone, perfectQuizzes: perf, badges: earned });
    onProfileUpdate(np, newBadges);
    markChapterDone(ch.id);
    setMode('read');
    if (curChapter < book.chapters.length - 1) setCurChapter(c => c+1);
  }

  function onFinalQuizDone(score, total) {
    markChapterDone('final');
    setMode('read');
  }

  const catColor = CAT_COLORS[book.category] || '#2c1810';

  return (
    <div className="reader-wrap fade-in">
      <div className="reader-back" onClick={onBack}>← Back to Library</div>

      <div className="reader-header">
        <div className="reader-category" style={{color: catColor}}>{book.categoryLabel}</div>
        <div className="reader-title">{book.title}</div>
        <div className="reader-meta">
          <span>📚 {book.chapters.length} {book.chapters.length===1?'Chapter':'Chapters'}</span>
          <span>📖 {completedChapters.filter(c=>c!=='final').length}/{book.chapters.length} read</span>
          {allDone && <span style={{color:'var(--gold)',fontWeight:800}}>✅ Completed!</span>}
        </div>
        <hr className="reader-divider"/>
      </div>

      {/* Chapter list */}
      <div className="chapter-list">
        <div className="chapter-list-header">
          <span style={{fontSize:18}}>📜</span>
          <div className="chapter-list-title">Table of Contents</div>
        </div>
        {book.chapters.map((c,i) => {
          const done = completedChapters.includes(c.id);
          const active = i === curChapter;
          return (
            <div key={c.id} className={`chapter-item${active?' active':''}${done?' done':''}`}
              onClick={() => { setCurChapter(i); setMode('read'); }}>
              <div className={`chapter-num${active?' active':done?' done':' default'}`}>
                {done ? '✓' : c.num}
              </div>
              <div className="chapter-info">
                <div className="chapter-name">{c.title}</div>
                <div className="chapter-sub">Chapter {c.num}</div>
              </div>
              <div className="chapter-status">{done ? '✅' : active ? '▶️' : '○'}</div>
            </div>
          );
        })}
        {allDone && (
          <div className={`chapter-item${mode==='final-quiz'?' active':''}`}
            onClick={() => setMode('final-quiz')}
            style={{background:'linear-gradient(90deg,#fef9e7,transparent)'}}>
            <div className="chapter-num" style={{background:'var(--gold)',color:'var(--ink)'}}>★</div>
            <div className="chapter-info">
              <div className="chapter-name">Final Quiz — All Chapters</div>
              <div className="chapter-sub">20 questions • Optional</div>
            </div>
            <div className="chapter-status">🏆</div>
          </div>
        )}
      </div>

      {/* Content */}
      {mode === 'read' && (
        <div className="story-content page-enter">
          {/* Scene illustration */}
          <div className="story-scene" style={{background: book.coverColor}}>
            {book.useRealPhoto ? (
              <div style={{textAlign:'center',padding:'20px'}}>
                <div style={{fontSize:18,color:'rgba(253,246,227,0.8)',fontFamily:'var(--font-ui)',fontStyle:'italic',marginBottom:8}}>{book.photoDesc}</div>
                <div style={{fontSize:60}}>🕌</div>
                <div style={{fontSize:12,color:'rgba(253,246,227,0.5)',fontFamily:'var(--font-ui)',marginTop:8}}>[Real photograph to be added]</div>
              </div>
            ) : (
              <>
                <div className="story-scene-emoji">{ch.scene}</div>
                <div className="story-scene-caption">{ch.sceneCaption}</div>
              </>
            )}
          </div>

          {/* Chapter header */}
          <div className="story-chapter-header">
            <div className="story-chapter-num">Chapter {ch.num}</div>
            <div className="story-chapter-title">{ch.title}</div>
          </div>

          {/* Story text */}
          <div className="story-body">
            {ch.content.map((para, i) => (
              <p key={i} dangerouslySetInnerHTML={{__html: para}}/>
            ))}
          </div>

          {/* Lesson box */}
          <div className="lesson-box">
            <div className="lesson-box-title">📖 What We Learned</div>
            {ch.learned.map((l,i) => <div key={i} className="lesson-item">{l}</div>)}
          </div>

          {/* Moral */}
          <div className="moral-box">
            <div className="moral-box-title">💎 Moral of the Story</div>
            <div className="moral-text">"{ch.moral}"</div>
          </div>

          {/* Navigation */}
          <div className="story-nav">
            <button className="story-nav-btn" onClick={() => { if(curChapter>0){setCurChapter(c=>c-1);setMode('read');} }} disabled={curChapter===0}>
              ← Previous
            </button>
            <div className="story-progress-dots">
              {book.chapters.map((_,i) => (
                <div key={i} className={`progress-dot${completedChapters.includes(book.chapters[i].id)?' done':i===curChapter?' current':''}`}
                  onClick={() => { setCurChapter(i); setMode('read'); }}/>
              ))}
            </div>
            <button className="story-nav-btn primary" onClick={() => setMode('quiz')}>
              Chapter Quiz →
            </button>
          </div>
        </div>
      )}

      {mode === 'quiz' && (
        <div className="story-content">
          <Quiz questions={book.quizQuestions.slice(0, Math.min(5, book.quizQuestions.length))}
            onComplete={onChapterQuizDone}
            title={ch.title}
            isChapter={true}/>
        </div>
      )}

      {mode === 'final-quiz' && (
        <div className="story-content">
          <Quiz questions={book.quizQuestions}
            onComplete={onFinalQuizDone}
            title={book.title}
            isChapter={false}/>
        </div>
      )}
    </div>
  );
}

// ─── Library ──────────────────────────────────────────────────────────────────
function Library({ profile, onOpenBook }) {
  const [activeCat, setActiveCat] = useState('all');
  const filtered = activeCat === 'all' ? BOOKS : BOOKS.filter(b => b.category === activeCat);

  function getProgress(book) {
    const done = profile.chaptersCompleted?.[book.id]?.length || 0;
    return Math.round((done / book.chapters.length) * 100);
  }

  return (
    <div>
      {/* Hero */}
      <div className="home-hero">
        <div className="home-hero-inner">
          <span className="home-bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</span>
          <div className="home-title">
            Qisas-ul-<span className="home-title-gold">Saliheen</span>
          </div>
          <div className="home-subtitle">Stories of the Righteous — for young Muslim hearts</div>
          <div className="home-stats">
            <div className="home-stat">
              <div className="home-stat-num">{BOOKS.length}</div>
              <div className="home-stat-label">Stories</div>
            </div>
            <div className="home-stat">
              <div className="home-stat-num">{BOOKS.reduce((a,b)=>a+b.chapters.length,0)}</div>
              <div className="home-stat-label">Chapters</div>
            </div>
            <div className="home-stat">
              <div className="home-stat-num">{profile.booksRead?.length || 0}</div>
              <div className="home-stat-label">Books Read</div>
            </div>
            <div className="home-stat">
              <div className="home-stat-num">{profile.badges?.length || 0}</div>
              <div className="home-stat-label">Badges</div>
            </div>
          </div>
        </div>
      </div>

      {/* Category tabs */}
      <div className="category-tabs">
        {CATEGORIES.map(c => (
          <button key={c.id} className={`cat-tab${activeCat===c.id?' active':''}`}
            onClick={() => setActiveCat(c.id)}>
            {c.label}
          </button>
        ))}
      </div>

      {/* Book grid */}
      <div className="books-grid-wrap">
        <div className="books-grid-title">{CATEGORIES.find(c=>c.id===activeCat)?.label}</div>
        <div className="books-grid">
          {filtered.map(book => {
            const prog = getProgress(book);
            const done = prog === 100;
            const catColor = CAT_COLORS[book.category] || '#2c1810';
            return (
              <div key={book.id} className="book-card fade-up" onClick={() => onOpenBook(book)}>
                {book.isNew && !done && <span className="book-card-badge new">NEW</span>}
                {done && <span className="book-card-badge done">✓ Done</span>}
                <div className="book-cover" style={{background: book.coverColor}}>
                  <div className="book-cover-emoji">{book.emoji}</div>
                </div>
                <div className="book-card-body">
                  <div className="book-card-category" style={{color: catColor}}>{book.categoryLabel}</div>
                  <div className="book-card-title">{book.title}</div>
                  <div className="book-card-desc">{book.desc}</div>
                  <div className="book-card-footer">
                    <div className="book-card-chapters">{book.chapters.length} {book.chapters.length===1?'chapter':'chapters'}</div>
                    <div style={{fontSize:12,fontFamily:'var(--font-ui)',fontWeight:700,color: prog>0?'var(--gold)':'var(--muted)'}}>
                      {prog > 0 ? prog+'%' : 'Start'}
                    </div>
                  </div>
                  <div className="book-card-progress">
                    <div className="book-card-progress-fill" style={{width: prog+'%'}}/>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── Badges Screen ────────────────────────────────────────────────────────────
function BadgesScreen({ profile }) {
  const earned = profile.badges || [];
  return (
    <div className="badges-wrap">
      <div style={{marginBottom:24}}>
        <div className="books-grid-title">My Badges</div>
        <div style={{fontFamily:'var(--font-ui)',fontSize:13,color:'var(--muted)',fontWeight:600}}>
          {earned.length} of {BADGES.length} badges earned
        </div>
      </div>
      <div className="badges-grid">
        {BADGES.map(b => {
          const isEarned = earned.includes(b.id);
          return (
            <div key={b.id} className={`badge-card${isEarned?' earned':' locked'}`}>
              <span className="badge-icon">{isEarned ? b.icon : '🔒'}</span>
              <div className="badge-name">{b.name}</div>
              <div className="badge-desc">{b.desc}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Parent Hub ───────────────────────────────────────────────────────────────
function ParentHub({ allProfiles }) {
  return (
    <div className="parent-wrap">
      <div className="books-grid-title" style={{marginBottom:20}}>Parent Overview</div>
      {allProfiles.map(({ username, profile }) => (
        <div key={username} style={{marginBottom:32}}>
          <div style={{fontFamily:'var(--font-title)',fontSize:18,color:'var(--ink2)',marginBottom:14,fontWeight:600}}>
            {profile.name || username}'s Progress
          </div>
          <div className="parent-grid">
            <div className="parent-card">
              <div className="parent-card-label">Books Read</div>
              <div className="parent-card-value">{profile.booksRead?.length || 0}</div>
              <div className="parent-card-sub">of {BOOKS.length} total</div>
            </div>
            <div className="parent-card">
              <div className="parent-card-label">Books Completed</div>
              <div className="parent-card-value">{profile.booksCompleted?.length || 0}</div>
            </div>
            <div className="parent-card">
              <div className="parent-card-label">Quizzes Taken</div>
              <div className="parent-card-value">{profile.quizzesCompleted || 0}</div>
            </div>
            <div className="parent-card">
              <div className="parent-card-label">Perfect Scores</div>
              <div className="parent-card-value">{profile.perfectQuizzes || 0}</div>
            </div>
            <div className="parent-card">
              <div className="parent-card-label">Badges Earned</div>
              <div className="parent-card-value">{profile.badges?.length || 0}</div>
              <div className="parent-card-sub">of {BADGES.length} available</div>
            </div>
            <div className="parent-card">
              <div className="parent-card-label">Reading Streak</div>
              <div className="parent-card-value">{profile.streak || 0}</div>
              <div className="parent-card-sub">days in a row</div>
            </div>
          </div>
          {profile.booksRead && profile.booksRead.length > 0 && (
            <div>
              <div style={{fontFamily:'var(--font-ui)',fontSize:11,fontWeight:800,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:10}}>Books Read</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {profile.booksRead.map(id => {
                  const bk = BOOKS.find(b=>b.id===id);
                  return bk ? (
                    <div key={id} style={{padding:'6px 12px',background:'var(--parchment2)',borderRadius:8,fontFamily:'var(--font-ui)',fontSize:12,fontWeight:700,color:'var(--ink2)',border:'1px solid var(--border)'}}>
                      {bk.emoji} {bk.title}
                    </div>
                  ) : null;
                })}
              </div>
            </div>
          )}
          <div style={{height:1,background:'var(--border)',margin:'24px 0'}}/>
        </div>
      ))}
    </div>
  );
}

// ─── PDF Sidebar Item ──────────────────────────────────────────────────────────
function PDFSidebar({ expanded, onToggle }) {
  return (
    <div className="pdf-section">
      <div className="pdf-section-header" onClick={onToggle}>
        <span style={{fontSize:16}}>📁</span>
        <div className="pdf-section-title">PDF LIBRARY</div>
        <span style={{marginLeft:'auto',fontSize:12,color:'rgba(232,184,75,0.6)'}}>{expanded?'▲':'▼'}</span>
      </div>
      {expanded && BOOKS.map(book => (
        <div key={book.id} className="pdf-item">
          <span className="pdf-item-icon">📄</span>
          <div className="pdf-item-name">{book.title}</div>
          <button className="pdf-download-btn" onClick={() => downloadBookPDF(book)}>⬇ TXT</button>
        </div>
      ))}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem(API_KEY_STORE) || '');
  const [apiInput, setApiInput] = useState('');
  const [apiErr, setApiErr] = useState('');
  const [apiLoading, setApiLoading] = useState(false);

  const [authMode, setAuthMode] = useState('login'); // login | register
  const [userType, setUserType] = useState('child');
  const [uInput, setUInput] = useState('');
  const [pInput, setPInput] = useState('');
  const [nameInput, setNameInput] = useState('');
  const [authErr, setAuthErr] = useState('');
  const [authLoading, setAuthLoading] = useState(false);

  const [username, setUsername] = useState(() => localStorage.getItem('qisas_user') || '');
  const [isParent, setIsParent] = useState(false);
  const [profile, setProfile] = useState({});

  const [screen, setScreen] = useState('library'); // library | reader | badges | parent
  const [activeBook, setActiveBook] = useState(null);
  const [pdfExpanded, setPdfExpanded] = useState(false);
  const [toast, setToast] = useState(null);

  // Load profile on mount
  useEffect(() => {
    if (username) {
      const p = getProfile(username);
      setProfile(p);
    }
  }, [username]);

  // Simple auth (localStorage-based for demo; replace with Supabase in prod)
  async function handleAuth() {
    if (!uInput.trim() || !pInput.trim()) { setAuthErr('Please fill in all fields.'); return; }
    if (authMode === 'register' && !nameInput.trim()) { setAuthErr('Please enter your name.'); return; }
    setAuthLoading(true);
    setAuthErr('');
    await new Promise(r => setTimeout(r, 400));

    const key = 'qisas_auth_' + uInput.trim().toLowerCase();
    if (authMode === 'register') {
      if (localStorage.getItem(key)) { setAuthErr('Username already exists.'); setAuthLoading(false); return; }
      const hash = btoa(pInput);
      localStorage.setItem(key, JSON.stringify({ hash, name: nameInput.trim(), type: userType }));
      const p = { name: nameInput.trim(), booksRead:[], badges:[], streak:0 };
      saveProfile(uInput.trim().toLowerCase(), p);
      setProfile(p);
      setUsername(uInput.trim().toLowerCase());
      setIsParent(userType === 'parent');
      localStorage.setItem('qisas_user', uInput.trim().toLowerCase());
    } else {
      const stored = localStorage.getItem(key);
      if (!stored) { setAuthErr('Username not found.'); setAuthLoading(false); return; }
      const { hash, type } = JSON.parse(stored);
      if (hash !== btoa(pInput)) { setAuthErr('Incorrect password.'); setAuthLoading(false); return; }
      const p = getProfile(uInput.trim().toLowerCase());
      setProfile(p);
      setUsername(uInput.trim().toLowerCase());
      setIsParent(type === 'parent');
      localStorage.setItem('qisas_user', uInput.trim().toLowerCase());
    }
    setAuthLoading(false);
  }

  async function validateApiKey(key) {
    setApiLoading(true);
    setApiErr('');
    try {
      await callClaude(key, [{ role:'user', content:'Say OK' }], '', 10);
      localStorage.setItem(API_KEY_STORE, key);
      setApiKey(key);
    } catch(e) {
      setApiErr('Invalid API key. Please check and try again.');
    }
    setApiLoading(false);
  }

  function logout() {
    setUsername('');
    localStorage.removeItem('qisas_user');
    setScreen('library');
    setActiveBook(null);
  }

  function handleProfileUpdate(newProfile, newBadges) {
    setProfile(newProfile);
    if (newBadges && newBadges.length > 0) {
      setToast(`Badge earned: ${newBadges[0].icon} ${newBadges[0].name}!`);
    }
  }

  // Get all child profiles for parent view
  const allChildProfiles = isParent ? (() => {
    const results = [];
    for (let i=0; i<localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith('qisas_auth_')) {
        try {
          const { type } = JSON.parse(localStorage.getItem(k));
          if (type === 'child') {
            const uname = k.replace('qisas_auth_', '');
            results.push({ username: uname, profile: getProfile(uname) });
          }
        } catch {}
      }
    }
    return results;
  })() : [];

  // API key screen
  if (!apiKey) {
    return (
      <div className="auth-wrap">
        <div className="auth-card" style={{animation:'fadeIn 0.5s ease'}}>
          <span className="auth-crescent">☪️</span>
          <div className="auth-title" style={{fontFamily:'var(--font-title)'}}>Qisas-ul-Saliheen</div>
          <div className="auth-subtitle">Enter your Anthropic API key to begin</div>
          {apiErr && <div className="auth-err">{apiErr}</div>}
          <div className="auth-field">
            <label className="auth-label">Anthropic API Key</label>
            <input className="auth-inp" type="password" placeholder="sk-ant-..." value={apiInput} onChange={e=>setApiInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&validateApiKey(apiInput)}/>
          </div>
          <button className="auth-btn" onClick={() => validateApiKey(apiInput)} disabled={apiLoading}>
            {apiLoading ? 'Checking...' : '✨ Enter the Library'}
          </button>
          <div style={{marginTop:16,fontFamily:'var(--font-ui)',fontSize:11,color:'var(--muted)',textAlign:'center'}}>
            Your key is stored locally and never sent to any server except Anthropic.
          </div>
        </div>
      </div>
    );
  }

  // Auth screen
  if (!username) {
    return (
      <div className="auth-wrap">
        <div className="auth-card" style={{animation:'fadeIn 0.5s ease'}}>
          <span className="auth-crescent">☪️</span>
          <div className="auth-title" style={{fontFamily:'var(--font-title)'}}>Qisas-ul-Saliheen</div>
          <div className="auth-arabic">قصص الصالحين</div>
          <div className="auth-tabs">
            <button className={`auth-tab${authMode==='login'?' active':''}`} onClick={()=>{setAuthMode('login');setAuthErr('')}}>Sign In</button>
            <button className={`auth-tab${authMode==='register'?' active':''}`} onClick={()=>{setAuthMode('register');setAuthErr('')}}>Register</button>
          </div>
          {authMode==='register' && (
            <div className="auth-type-row">
              <button className={`auth-type-btn${userType==='child'?' active':''}`} onClick={()=>setUserType('child')}>
                <span className="auth-type-icon">👦</span>Child
              </button>
              <button className={`auth-type-btn${userType==='parent'?' active':''}`} onClick={()=>setUserType('parent')}>
                <span className="auth-type-icon">👨</span>Parent
              </button>
            </div>
          )}
          {authErr && <div className="auth-err">{authErr}</div>}
          {authMode==='register' && (
            <div className="auth-field">
              <label className="auth-label">Your Name</label>
              <input className="auth-inp" placeholder="e.g. Ibraheem" value={nameInput} onChange={e=>setNameInput(e.target.value)}/>
            </div>
          )}
          <div className="auth-field">
            <label className="auth-label">Username</label>
            <input className="auth-inp" placeholder="e.g. ibraheem" value={uInput} onChange={e=>setUInput(e.target.value)}/>
          </div>
          <div className="auth-field">
            <label className="auth-label">Password</label>
            <input className="auth-inp" type="password" placeholder="••••••••" value={pInput} onChange={e=>setPInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&handleAuth()}/>
          </div>
          <button className="auth-btn" onClick={handleAuth} disabled={authLoading}>
            {authLoading ? 'One moment...' : authMode==='login' ? '📖 Enter the Library' : '🌟 Begin My Journey'}
          </button>
        </div>
      </div>
    );
  }

  // Main app
  return (
    <div className="app">
      {/* Header */}
      <div className="header">
        <span className="header-crescent">☪️</span>
        <div className="header-logo">
          Qisas-ul-Saliheen
          <span>Stories of the Righteous</span>
        </div>
        <div className="header-right">
          {!isParent && (
            <>
              <button className={`header-btn${screen==='library'?' active':''}`} onClick={()=>{setScreen('library');setActiveBook(null)}}>📚 Library</button>
              <button className={`header-btn${screen==='badges'?' active':''}`} onClick={()=>setScreen('badges')}>🏅 Badges</button>
            </>
          )}
          {isParent && (
            <button className={`header-btn${screen==='parent'?' active':''}`} onClick={()=>setScreen('parent')}>📊 Overview</button>
          )}
          <div className="user-badge">
            <span className="user-badge-icon">{isParent?'👨':'👦'}</span>
            <span className="user-badge-name">{profile.name || username}</span>
          </div>
          <button className="header-btn" onClick={logout}>Sign Out</button>
        </div>
      </div>

      <div className="main-layout">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="sidebar-section">
            <div className="sidebar-section-title">Categories</div>
            {CATEGORIES.filter(c=>c.id!=='all').map(c => {
              const count = BOOKS.filter(b=>b.category===c.id).length;
              return (
                <div key={c.id} className="sidebar-item" onClick={()=>{setScreen('library');setActiveBook(null)}}>
                  <span className="sidebar-item-icon">{c.label.split(' ')[0]}</span>
                  <div className="sidebar-item-text">
                    <div className="sidebar-item-name">{c.label.split(' ').slice(1).join(' ')}</div>
                    <div className="sidebar-item-sub">{count} {count===1?'story':'stories'}</div>
                  </div>
                  <span className="sidebar-item-badge">{count}</span>
                </div>
              );
            })}
          </div>

          <div className="sidebar-divider"/>

          {!isParent && (
            <div className="sidebar-section">
              <div className="sidebar-section-title">My Progress</div>
              <div className="sidebar-item">
                <span className="sidebar-item-icon">📖</span>
                <div className="sidebar-item-text">
                  <div className="sidebar-item-name">Books Read</div>
                  <div className="sidebar-item-sub">{profile.booksRead?.length || 0} of {BOOKS.length}</div>
                </div>
              </div>
              <div className="sidebar-item">
                <span className="sidebar-item-icon">🏅</span>
                <div className="sidebar-item-text">
                  <div className="sidebar-item-name">Badges</div>
                  <div className="sidebar-item-sub">{profile.badges?.length || 0} earned</div>
                </div>
              </div>
              <div className="sidebar-item">
                <span className="sidebar-item-icon">⭐</span>
                <div className="sidebar-item-text">
                  <div className="sidebar-item-name">Perfect Quizzes</div>
                  <div className="sidebar-item-sub">{profile.perfectQuizzes || 0}</div>
                </div>
              </div>
            </div>
          )}

          <div className="sidebar-divider"/>

          {/* PDF Library */}
          <PDFSidebar expanded={pdfExpanded} onToggle={()=>setPdfExpanded(e=>!e)}/>
        </div>

        {/* Main content */}
        <div className="content">
          {screen === 'library' && !activeBook && (
            <Library profile={profile} onOpenBook={book=>{setActiveBook(book);setScreen('reader');}}/>
          )}
          {screen === 'reader' && activeBook && (
            <BookReader book={activeBook} profile={profile} username={username}
              onBack={()=>{setScreen('library');setActiveBook(null)}}
              onProfileUpdate={handleProfileUpdate}/>
          )}
          {screen === 'badges' && <BadgesScreen profile={profile}/>}
          {screen === 'parent' && <ParentHub allProfiles={allChildProfiles}/>}
        </div>
      </div>

      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
