// ─── ParentHub ────────────────────────────────────────────────────────────────
function ParentHub({ allProfiles, onRefresh }) {
  const [tab, setTab]             = useState('children');   // 'children' | 'manage'
  const [selected, setSelected]   = useState(null);         // username of selected child
  const [editName, setEditName]   = useState('');
  const [editMsg, setEditMsg]     = useState(null);          // {type:'ok'|'err', text}
  const [newPass, setNewPass]     = useState('');
  const [newPass2, setNewPass2]   = useState('');
  const [passMsg, setPassMsg]     = useState(null);
  const [saving, setSaving]       = useState(false);

  // makeHash must be available here (duplicate definition is safe — same pure fn)
  function hashPw(pw) {
    try { return btoa(encodeURIComponent(pw)); } catch { return btoa(pw); }
  }

  // Get fresh child data for selected child
  const childData = selected
    ? allProfiles.find(p => p.username === selected)
    : null;
  const childProfile = childData ? childData.profile : {};

  // ── Stats ──────────────────────────────────────────────────────────────────
  const totalBooks    = BOOKS.length;
  const totalChapters = BOOKS.reduce((a,b) => a + b.chapters.length, 0);
  const booksRead     = (childProfile.booksRead     || []).length;
  const booksComplete = (childProfile.booksCompleted|| []).length;
  const quizzesDone   = childProfile.quizzesCompleted || 0;
  const perfects      = childProfile.perfectQuizzes   || 0;
  const badgesEarned  = (childProfile.badges          || []).length;
  const chapsDone     = Object.values(childProfile.chaptersCompleted || {})
    .reduce((a,arr) => a + arr.filter(c=>c!=='final').length, 0);
  const libPct        = totalChapters > 0 ? Math.round((chapsDone / totalChapters) * 100) : 0;

  // ── Save name ──────────────────────────────────────────────────────────────
  async function saveName() {
    const trimmed = editName.trim();
    if (!trimmed) { setEditMsg({type:'err', text:'Name cannot be empty.'}); return; }
    setSaving(true); setEditMsg(null);
    await new Promise(r => setTimeout(r,200));
    // Update auth record
    const authKey = 'qisas_auth_' + selected;
    try {
      const rec = JSON.parse(localStorage.getItem(authKey) || '{}');
      rec.name = trimmed;
      localStorage.setItem(authKey, JSON.stringify(rec));
    } catch {}
    // Update profile
    const p = getProfile(selected);
    p.name = trimmed;
    saveProfile(selected, p);
    setEditMsg({type:'ok', text:`Name updated to "${trimmed}" ✅`});
    setSaving(false);
    if (onRefresh) onRefresh();
  }

  // ── Reset password ─────────────────────────────────────────────────────────
  async function resetPassword() {
    if (!newPass.trim()) { setPassMsg({type:'err', text:'Enter a new password.'}); return; }
    if (newPass !== newPass2) { setPassMsg({type:'err', text:'Passwords do not match.'}); return; }
    if (newPass.length < 4) { setPassMsg({type:'err', text:'Password must be at least 4 characters.'}); return; }
    setSaving(true); setPassMsg(null);
    await new Promise(r => setTimeout(r,200));
    const authKey = 'qisas_auth_' + selected;
    try {
      const rec = JSON.parse(localStorage.getItem(authKey) || '{}');
      rec.hash = hashPw(newPass.trim());
      localStorage.setItem(authKey, JSON.stringify(rec));
      setPassMsg({type:'ok', text:'Password updated successfully ✅'});
      setNewPass(''); setNewPass2('');
    } catch {
      setPassMsg({type:'err', text:'Could not update password. Try again.'});
    }
    setSaving(false);
  }

  // ── Select child and pre-fill name ────────────────────────────────────────
  function selectChild(uname) {
    setSelected(uname);
    setEditMsg(null); setPassMsg(null); setNewPass(''); setNewPass2('');
    const p = allProfiles.find(x => x.username === uname);
    setEditName(p ? (p.profile.name || uname) : uname);
    setTab('children');
  }

  // ── Overview numbers (all children combined) ───────────────────────────────
  const totalBooksReadAll    = allProfiles.reduce((a,p)=>a+(p.profile.booksRead||[]).length,0);
  const totalQuizzesAll      = allProfiles.reduce((a,p)=>a+(p.profile.quizzesCompleted||0),0);
  const totalBadgesAll       = allProfiles.reduce((a,p)=>a+(p.profile.badges||[]).length,0);

  return (
    <div className="parent-wrap">
      {/* Top nav tabs */}
      <div className="parent-nav">
        <button className={`parent-tab${tab==='children'?' active':''}`} onClick={()=>setTab('children')}>
          👦 Children
        </button>
        <button className={`parent-tab${tab==='manage'?' active':''}`} onClick={()=>{setTab('manage');}}>
          ⚙️ Manage Accounts
        </button>
      </div>

      <div className="parent-body">

        {/* ══════ TAB: CHILDREN ══════ */}
        {tab === 'children' && (
          <div>
            {/* Summary strip */}
            {allProfiles.length > 0 && !selected && (
              <div className="parent-grid" style={{marginBottom:28}}>
                <div className="parent-card">
                  <div className="parent-card-label">Children</div>
                  <div className="parent-card-value">{allProfiles.length}</div>
                  <div className="parent-card-sub">registered accounts</div>
                </div>
                <div className="parent-card">
                  <div className="parent-card-label">Books Read</div>
                  <div className="parent-card-value">{totalBooksReadAll}</div>
                  <div className="parent-card-sub">across all children</div>
                </div>
                <div className="parent-card">
                  <div className="parent-card-label">Quizzes Done</div>
                  <div className="parent-card-value">{totalQuizzesAll}</div>
                </div>
                <div className="parent-card">
                  <div className="parent-card-label">Badges Earned</div>
                  <div className="parent-card-value">{totalBadgesAll}</div>
                  <div className="parent-card-sub">of {BADGES.length * allProfiles.length} possible</div>
                </div>
              </div>
            )}

            {/* No children yet */}
            {allProfiles.length === 0 && (
              <div style={{textAlign:'center',padding:'48px 20px',color:'var(--muted)',fontFamily:'var(--font-ui)'}}>
                <div style={{fontSize:48,marginBottom:16}}>👦</div>
                <div style={{fontWeight:800,fontSize:16,marginBottom:8,color:'var(--ink2)'}}>No child accounts yet</div>
                <div style={{fontSize:13,fontWeight:600}}>Ask your child to register an account with type "Child" to see their progress here.</div>
              </div>
            )}

            {/* Child cards grid — no child selected */}
            {!selected && allProfiles.length > 0 && (
              <div>
                <div className="detail-section-title" style={{marginBottom:18}}>Select a child to see their full progress</div>
                <div className="child-cards">
                  {allProfiles.map(({ username: uname, profile: prof }) => {
                    const br = (prof.booksRead||[]).length;
                    const bc = (prof.booksCompleted||[]).length;
                    const qz = prof.quizzesCompleted || 0;
                    const bg = (prof.badges||[]).length;
                    const pct = totalChapters > 0
                      ? Math.round(Object.values(prof.chaptersCompleted||{}).reduce((a,arr)=>a+arr.filter(c=>c!=='final').length,0) / totalChapters * 100)
                      : 0;
                    return (
                      <div key={uname} className="child-card" onClick={() => selectChild(uname)}>
                        <div className="child-card-header">
                          <div className="child-card-avatar">👦</div>
                          <div>
                            <div className="child-card-name">{prof.name || uname}</div>
                            <div className="child-card-user">@{uname}</div>
                          </div>
                        </div>
                        <div className="child-card-body">
                          <div className="child-card-stat">
                            <span className="child-card-stat-label">📚 Books Read</span>
                            <span className="child-card-stat-val">{br} / {totalBooks}</span>
                          </div>
                          <div className="child-card-stat">
                            <span className="child-card-stat-label">✅ Completed</span>
                            <span className="child-card-stat-val">{bc}</span>
                          </div>
                          <div className="child-card-stat">
                            <span className="child-card-stat-label">📝 Quizzes</span>
                            <span className="child-card-stat-val">{qz}</span>
                          </div>
                          <div className="child-card-stat">
                            <span className="child-card-stat-label">🏅 Badges</span>
                            <span className="child-card-stat-val">{bg} / {BADGES.length}</span>
                          </div>
                          <div className="child-progress-bar">
                            <div className="child-progress-fill" style={{width: pct+'%'}}/>
                          </div>
                          <div className="child-progress-label">{pct}% of library read</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Detail view — child selected */}
            {selected && childData && (
              <div>
                <div className="detail-panel">
                  <div className="detail-header">
                    <div>
                      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
                        <span className="detail-back" onClick={() => setSelected(null)}>← All Children</span>
                      </div>
                      <div className="detail-title">{childProfile.name || selected}'s Progress</div>
                      <div className="detail-sub">@{selected}</div>
                    </div>
                  </div>

                  <div className="detail-body">
                    {/* Stats grid */}
                    <div className="detail-section">
                      <div className="detail-section-title">Overview</div>
                      <div className="parent-grid">
                        <div className="parent-card">
                          <div className="parent-card-label">Books Read</div>
                          <div className="parent-card-value">{booksRead}</div>
                          <div className="parent-card-sub">of {totalBooks}</div>
                        </div>
                        <div className="parent-card">
                          <div className="parent-card-label">Completed</div>
                          <div className="parent-card-value">{booksComplete}</div>
                          <div className="parent-card-sub">all chapters done</div>
                        </div>
                        <div className="parent-card">
                          <div className="parent-card-label">Chapters Read</div>
                          <div className="parent-card-value">{chapsDone}</div>
                          <div className="parent-card-sub">of {totalChapters}</div>
                        </div>
                        <div className="parent-card">
                          <div className="parent-card-label">Quizzes</div>
                          <div className="parent-card-value">{quizzesDone}</div>
                        </div>
                        <div className="parent-card">
                          <div className="parent-card-label">Perfect Scores</div>
                          <div className="parent-card-value">{perfects}</div>
                        </div>
                        <div className="parent-card">
                          <div className="parent-card-label">Badges</div>
                          <div className="parent-card-value">{badgesEarned}</div>
                          <div className="parent-card-sub">of {BADGES.length}</div>
                        </div>
                      </div>
                      {/* Library progress bar */}
                      <div style={{background:'var(--parchment)',borderRadius:12,padding:'14px 18px',border:'1px solid var(--border)'}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                          <span style={{fontFamily:'var(--font-ui)',fontSize:12,fontWeight:800,color:'var(--ink2)'}}>Library Progress</span>
                          <span style={{fontFamily:'var(--font-ui)',fontSize:12,fontWeight:800,color:'var(--gold)'}}>{libPct}%</span>
                        </div>
                        <div className="child-progress-bar" style={{height:10}}>
                          <div className="child-progress-fill" style={{width:libPct+'%'}}/>
                        </div>
                        <div style={{fontFamily:'var(--font-ui)',fontSize:11,color:'var(--muted)',fontWeight:600,marginTop:6}}>{chapsDone} of {totalChapters} chapters read across all books</div>
                      </div>
                    </div>

                    {/* Books read */}
                    {(childProfile.booksRead||[]).length > 0 && (
                      <div className="detail-section">
                        <div className="detail-section-title">Books Read</div>
                        <div className="badge-mini-grid">
                          {(childProfile.booksRead||[]).map(id => {
                            const bk = BOOKS.find(b=>b.id===id);
                            const done = (childProfile.booksCompleted||[]).includes(id);
                            return bk ? (
                              <div key={id} className="book-chip" style={{borderColor: done ? 'var(--gold)' : 'var(--border)', background: done ? '#fef9e7' : 'var(--parchment2)'}}>
                                {done ? '✅ ' : '📖 '}{bk.title}
                              </div>
                            ) : null;
                          })}
                        </div>
                      </div>
                    )}

                    {/* Badges */}
                    <div className="detail-section">
                      <div className="detail-section-title">Badges</div>
                      <div className="badge-mini-grid">
                        {BADGES.map(b => {
                          const earned = (childProfile.badges||[]).includes(b.id);
                          return (
                            <div key={b.id} className={`badge-mini ${earned?'earned':'locked'}`}>
                              <span>{earned ? b.icon : '🔒'}</span>
                              <span>{b.name}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Per-book chapter breakdown */}
                    {(childProfile.chaptersCompleted && Object.keys(childProfile.chaptersCompleted).length > 0) && (
                      <div className="detail-section">
                        <div className="detail-section-title">Chapter Progress by Book</div>
                        <div style={{display:'flex',flexDirection:'column',gap:10}}>
                          {BOOKS.filter(b=>(childProfile.chaptersCompleted||{})[b.id]).map(bk => {
                            const done = ((childProfile.chaptersCompleted||{})[bk.id]||[]).filter(c=>c!=='final').length;
                            const pct = Math.round(done / bk.chapters.length * 100);
                            return (
                              <div key={bk.id} style={{background:'var(--parchment)',borderRadius:10,padding:'12px 16px',border:'1px solid var(--border)'}}>
                                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                                  <span style={{fontFamily:'var(--font-body)',fontSize:13,fontWeight:700,color:'var(--ink)'}}>{bk.title}</span>
                                  <span style={{fontFamily:'var(--font-ui)',fontSize:12,fontWeight:800,color:pct===100?'var(--gold)':'var(--muted)'}}>{done}/{bk.chapters.length} {pct===100?'✅':''}</span>
                                </div>
                                <div className="child-progress-bar" style={{height:6}}>
                                  <div className="child-progress-fill" style={{width:pct+'%'}}/>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══════ TAB: MANAGE ══════ */}
        {tab === 'manage' && (
          <div>
            {allProfiles.length === 0 && (
              <div style={{textAlign:'center',padding:'48px 20px',color:'var(--muted)',fontFamily:'var(--font-ui)'}}>
                <div style={{fontSize:48,marginBottom:16}}>⚙️</div>
                <div style={{fontWeight:800,fontSize:16,color:'var(--ink2)'}}>No child accounts registered yet.</div>
              </div>
            )}

            {allProfiles.map(({ username: uname, profile: prof }) => {
              const isOpen = selected === uname;
              return (
                <div key={uname} className="detail-panel" style={{marginBottom:20}}>
                  {/* Card header — always visible, click to expand */}
                  <div className="detail-header" style={{cursor:'pointer'}} onClick={() => {
                    if (isOpen) { setSelected(null); setEditMsg(null); setPassMsg(null); }
                    else { selectChild(uname); setTab('manage'); }
                  }}>
                    <div className="child-card-avatar" style={{width:42,height:42,fontSize:20}}>👦</div>
                    <div style={{flex:1}}>
                      <div className="detail-title" style={{fontSize:17}}>{prof.name || uname}</div>
                      <div className="detail-sub">@{uname}</div>
                    </div>
                    <div style={{color:'rgba(232,184,75,0.6)',fontFamily:'var(--font-ui)',fontSize:13,fontWeight:800}}>
                      {isOpen ? '▲ Close' : '▼ Edit'}
                    </div>
                  </div>

                  {/* Expanded manage panel */}
                  {isOpen && (
                    <div className="detail-body">

                      {/* ── Change Name ── */}
                      <div className="detail-section">
                        <div className="detail-section-title">✏️ Change Display Name</div>
                        <div className="edit-form">
                          <div className="edit-row">
                            <div className="edit-field">
                              <label className="edit-label">New Name</label>
                              <input className="edit-inp" placeholder="e.g. Ibraheem" value={editName}
                                onChange={e=>{setEditName(e.target.value);setEditMsg(null);}}/>
                            </div>
                            <button className="edit-btn primary" onClick={saveName} disabled={saving}>
                              {saving ? 'Saving…' : 'Save Name'}
                            </button>
                          </div>
                          {editMsg && <div className={editMsg.type==='ok'?'edit-success':'edit-error'}>{editMsg.text}</div>}
                        </div>
                      </div>

                      {/* ── Reset Password ── */}
                      <div className="detail-section">
                        <div className="detail-section-title">🔑 Reset Password</div>
                        <div className="edit-form">
                          <div className="edit-row">
                            <div className="edit-field">
                              <label className="edit-label">New Password</label>
                              <input className="edit-inp" type="password" placeholder="Min. 4 characters" value={newPass}
                                onChange={e=>{setNewPass(e.target.value);setPassMsg(null);}}/>
                            </div>
                            <div className="edit-field">
                              <label className="edit-label">Confirm Password</label>
                              <input className="edit-inp" type="password" placeholder="Repeat password" value={newPass2}
                                onChange={e=>{setNewPass2(e.target.value);setPassMsg(null);}}
                                onKeyDown={e=>e.key==='Enter'&&resetPassword()}/>
                            </div>
                            <button className="edit-btn primary" onClick={resetPassword} disabled={saving}>
                              {saving ? 'Saving…' : 'Set Password'}
                            </button>
                          </div>
                          {passMsg && <div className={passMsg.type==='ok'?'edit-success':'edit-error'}>{passMsg.text}</div>}
                          <div style={{fontFamily:'var(--font-ui)',fontSize:11,color:'var(--muted)',marginTop:8,fontWeight:600}}>
                            💡 Use this if your child forgets their password. Their reading progress will not be affected.
                          </div>
                        </div>
                      </div>

                      {/* ── Quick stats in manage view ── */}
                      <div className="detail-section" style={{marginBottom:0}}>
                        <div className="detail-section-title">📊 Quick Stats</div>
                        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                          {[
                            ['📚','Books Read', (prof.booksRead||[]).length + ' / ' + totalBooks],
                            ['✅','Completed',  (prof.booksCompleted||[]).length],
                            ['📝','Quizzes',    prof.quizzesCompleted||0],
                            ['🏅','Badges',     (prof.badges||[]).length + ' / ' + BADGES.length],
                            ['⭐','Perfects',   prof.perfectQuizzes||0],
                          ].map(([icon,label,val])=>(
                            <div key={label} style={{background:'var(--parchment)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px',minWidth:90,textAlign:'center'}}>
                              <div style={{fontSize:20,marginBottom:4}}>{icon}</div>
                              <div style={{fontFamily:'var(--font-ui)',fontSize:11,fontWeight:800,color:'var(--muted)',marginBottom:3}}>{label}</div>
                              <div style={{fontFamily:'var(--font-title)',fontSize:16,fontWeight:700,color:'var(--ink)'}}>{val}</div>
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  // Auth state
  const [authMode, setAuthMode] = useState('login');
  const [userType, setUserType] = useState('child');
  const [uInput, setUInput] = useState('');
  const [pInput, setPInput] = useState('');
  const [nameInput, setNameInput] = useState('');
  const [authErr, setAuthErr] = useState('');
  const [authLoading, setAuthLoading] = useState(false);

  // Session state
  const [username, setUsername] = useState(() => localStorage.getItem('qisas_user') || '');
  const [isParent, setIsParent] = useState(() => {
    const u = localStorage.getItem('qisas_user');
    if (!u) return false;
    try { return JSON.parse(localStorage.getItem('qisas_auth_'+u)||'{}').type === 'parent'; } catch { return false; }
  });
  const [profile, setProfile] = useState(() => {
    const u = localStorage.getItem('qisas_user');
    return u ? getProfile(u) : {};
  });

  const voice = useVoice();
  const [screen, setScreen]       = useState('library');
  const [activeBook, setActiveBook] = useState(null);
  const [activeCat, setActiveCat] = useState('all');
  const [toast, setToast]         = useState(null);
  const [refreshTick, setRefreshTick] = useState(0); // bump to re-read child profiles

  // ── Auth ──────────────────────────────────────────────────────────────────
  // Consistent hash: same function used for both register and login
  function makeHash(pw) {
    try { return btoa(encodeURIComponent(pw)); } catch(e) { return btoa(pw); }
  }

  async function handleAuth() {
    const user = uInput.trim().toLowerCase();
    const pass = pInput.trim();
    const name = nameInput.trim();

    if (!user || !pass) { setAuthErr('Please fill in all fields.'); return; }
    if (authMode === 'register' && !name) { setAuthErr('Please enter your name.'); return; }

    setAuthLoading(true); setAuthErr('');
    await new Promise(r => setTimeout(r, 250));

    const storageKey = 'qisas_auth_' + user;

    if (authMode === 'register') {
      if (localStorage.getItem(storageKey)) {
        setAuthErr('Username already taken. Please sign in instead.');
        setAuthLoading(false); return;
      }
      // Save auth record with consistent hash
      localStorage.setItem(storageKey, JSON.stringify({ hash: makeHash(pass), name, type: userType }));

      // Save blank profile
      const p = { name, booksRead:[], badges:[], streak:0, chaptersCompleted:{}, booksCompleted:[], quizzesCompleted:0, perfectQuizzes:0 };
      saveProfile(user, p);
      localStorage.setItem('qisas_user', user);
      setProfile(p);
      setUsername(user);
      setIsParent(userType === 'parent');

    } else {
      // Login — look up stored record
      const raw = localStorage.getItem(storageKey);
      if (!raw) {
        setAuthErr('No account found for "' + user + '". Please register first.');
        setAuthLoading(false); return;
      }
      let record;
      try { record = JSON.parse(raw); } catch(e) {
        setAuthErr('Account data error. Please register again.');
        setAuthLoading(false); return;
      }
      // Accept both hash formats for backwards compatibility
      const ok = record.hash === makeHash(pass)
               || record.hash === btoa(pass)
               || record.hash === btoa(unescape(encodeURIComponent(pass)));
      if (!ok) {
        setAuthErr('Incorrect password. Please try again.');
        setAuthLoading(false); return;
      }
      const p = getProfile(user);
      localStorage.setItem('qisas_user', user);
      setProfile(p);
      setUsername(user);
      setIsParent(record.type === 'parent');
    }

    setAuthLoading(false);
  }

  // ── FIX: Sign Out — clears user state and goes back to AUTH (not API key) ──
  function logout() {
    voice.stop();
    localStorage.removeItem('qisas_user');
    setUsername('');
    setIsParent(false);
    setProfile({});
    setScreen('library');
    setActiveBook(null);
    setActiveCat('all');
    setUInput('');
    setPInput('');
    setNameInput('');
    setAuthErr('');
  }

  function handleProfileUpdate(newProfile, newBadges) {
    setProfile(newProfile);
    if (newBadges && newBadges.length > 0) {
      setToast(`Badge earned: ${newBadges[0].icon} ${newBadges[0].name}!`);
    }
  }

  // FIX: sidebar category click → go to library with that category active
  function goToCategory(catId) {
    setActiveCat(catId);
    setScreen('library');
    setActiveBook(null);
  }

  // Re-reads every time refreshTick changes (after parent edits a child)
  const allChildProfiles = useCallback(() => {
    if (!isParent) return [];
    const results = [];
    for (let i=0; i<localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('qisas_auth_')) {
        try {
          const { type } = JSON.parse(localStorage.getItem(k));
          if (type === 'child') {
            const uname = k.replace('qisas_auth_', '');
            results.push({ username: uname, profile: getProfile(uname) });
          }
        } catch {}
      }
    }
    return results;
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [isParent, refreshTick])();

  // ── Auth screen ────────────────────────────────────────────────────────────
  if (!username) {
    // Detect saved accounts so we can show them
    const savedAccounts = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('qisas_auth_')) {
        try {
          const rec = JSON.parse(localStorage.getItem(k));
          savedAccounts.push({ user: k.replace('qisas_auth_', ''), name: rec.name, type: rec.type });
        } catch {}
      }
    }
    // Auto-detect: if user typed a known username, switch to login
    const typedKnown = uInput.trim() && localStorage.getItem('qisas_auth_' + uInput.trim().toLowerCase());

    return (
      <div className="auth-wrap">
        <div className="auth-card" style={{animation:'fadeIn 0.5s ease'}}>
          <span className="auth-crescent">☪️</span>
          <div className="auth-title" style={{fontFamily:'var(--font-title)'}}>Qisas-ul-Saliheen</div>
          <div className="auth-arabic">قصص الصالحين</div>

          {/* Quick-pick saved accounts */}
          {savedAccounts.length > 0 && authMode === 'login' && (
            <div style={{marginBottom:16}}>
              <div style={{fontFamily:'var(--font-ui)',fontSize:10,fontWeight:800,letterSpacing:'2px',textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>
                Saved Accounts
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {savedAccounts.map(acc => (
                  <button key={acc.user}
                    style={{padding:'7px 14px',borderRadius:10,border:'2px solid var(--border)',background:uInput===acc.user?'var(--parchment2)':'var(--white)',fontFamily:'var(--font-ui)',fontSize:12,fontWeight:800,cursor:'pointer',color:'var(--ink)',transition:'all 0.2s',display:'flex',alignItems:'center',gap:6}}
                    onClick={()=>setUInput(acc.user)}>
                    {acc.type==='parent'?'👨':'👦'} {acc.name || acc.user}
                  </button>
                ))}
              </div>
            </div>
          )}

          <div className="auth-tabs">
            <button className={`auth-tab${authMode==='login'?' active':''}`} onClick={()=>{setAuthMode('login');setAuthErr('')}}>Sign In</button>
            <button className={`auth-tab${authMode==='register'?' active':''}`} onClick={()=>{setAuthMode('register');setAuthErr('')}}>Register</button>
          </div>

          {authMode==='register' && (
            <div className="auth-type-row">
              <button className={`auth-type-btn${userType==='child'?' active':''}`} onClick={()=>setUserType('child')}>
                <span style={{fontSize:24}}>👦</span>Child
              </button>
              <button className={`auth-type-btn${userType==='parent'?' active':''}`} onClick={()=>setUserType('parent')}>
                <span style={{fontSize:24}}>👨</span>Parent
              </button>
            </div>
          )}

          {authErr && <div className="auth-err">{authErr}</div>}

          {/* Smart hint: typed username exists, suggest signing in */}
          {!authErr && typedKnown && authMode==='register' && (
            <div style={{background:'#fef9e7',border:'1px solid var(--gold)',borderRadius:8,padding:'8px 12px',marginBottom:10,fontFamily:'var(--font-ui)',fontSize:12,fontWeight:700,color:'var(--ink2)'}}>
              ✅ That username exists — <span style={{color:'var(--teal)',cursor:'pointer',textDecoration:'underline'}} onClick={()=>setAuthMode('login')}>Sign in instead?</span>
            </div>
          )}
          {!authErr && uInput.trim() && !typedKnown && authMode==='login' && (
            <div style={{background:'#fef9e7',border:'1px solid var(--gold)',borderRadius:8,padding:'8px 12px',marginBottom:10,fontFamily:'var(--font-ui)',fontSize:12,fontWeight:700,color:'var(--ink2)'}}>
              ℹ️ No account for "{uInput.trim()}" yet — <span style={{color:'var(--teal)',cursor:'pointer',textDecoration:'underline'}} onClick={()=>setAuthMode('register')}>Register instead?</span>
            </div>
          )}

          {authMode==='register' && (
            <div className="auth-field">
              <label className="auth-label">Your Name</label>
              <input className="auth-inp" placeholder="e.g. Ibraheem" value={nameInput} onChange={e=>setNameInput(e.target.value)}/>
            </div>
          )}
          <div className="auth-field">
            <label className="auth-label">Username</label>
            <input className="auth-inp" placeholder="e.g. ibraheem" value={uInput}
              onChange={e=>{setUInput(e.target.value);setAuthErr('');}}
              autoComplete="username"/>
          </div>
          <div className="auth-field">
            <label className="auth-label">Password</label>
            <input className="auth-inp" type="password" placeholder="••••••••" value={pInput}
              onChange={e=>setPInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&handleAuth()}
              autoComplete={authMode==='login'?'current-password':'new-password'}/>
          </div>
          <button className="auth-btn" onClick={handleAuth} disabled={authLoading}>
            {authLoading ? 'One moment...' : authMode==='login' ? '📖 Enter the Library' : '🌟 Create My Account'}
          </button>
          {authMode==='register' && (
            <div style={{marginTop:12,fontFamily:'var(--font-ui)',fontSize:11,color:'var(--muted)',textAlign:'center',fontWeight:600}}>
              Your account is saved in this browser. Next time, just sign in.
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Main app ────────────────────────────────────────────────────────────────
  return (
    <div className="app">
      <div className="header">
        <span className="header-crescent">☪️</span>
        <div className="header-logo">
          Qisas-ul-Saliheen
          <span>Stories of the Righteous</span>
        </div>
        <div className="header-right">
          {!isParent && (
            <>
              <button className={`header-btn${screen==='library'&&!activeBook?' active':''}`}
                onClick={()=>{setScreen('library');setActiveBook(null)}}>📚 Library</button>
              <button className={`header-btn${screen==='badges'?' active':''}`}
                onClick={()=>setScreen('badges')}>🏅 Badges</button>
            </>
          )}
          {isParent && (
            <button className={`header-btn${screen==='parent'?' active':''}`}
              onClick={()=>setScreen('parent')}>📊 Overview</button>
          )}
          <VoiceToggle voice={voice}/>
          <div className="user-badge">
            <span className="user-badge-icon">{isParent?'👨':'📖'}</span>
            <span className="user-badge-name">{profile.name || username}</span>
          </div>
          {/* FIX: Sign Out clears user, goes to auth screen (not API key screen) */}
          <button className="header-btn" onClick={logout}>Sign Out</button>
        </div>
      </div>

      <div className="main-layout">
        <div className="sidebar">
          <div className="sidebar-section">
            <div className="sidebar-section-title">Categories</div>
            {CATEGORIES.filter(c=>c.id!=='all').map(c => {
              const count = BOOKS.filter(b=>b.category===c.id).length;
              // FIX: sidebar category click goes to library with that category filtered
              return (
                <div key={c.id}
                  className={`sidebar-item${activeCat===c.id&&screen==='library'?' active':''}`}
                  onClick={() => goToCategory(c.id)}>
                  <span className="sidebar-item-icon">{c.label.split(' ')[0]}</span>
                  <div className="sidebar-item-text">
                    <div className="sidebar-item-name">{c.label.split(' ').slice(1).join(' ')}</div>
                    <div className="sidebar-item-sub">{count} {count===1?'story':'stories'}</div>
                  </div>
                  <span className="sidebar-item-badge">{count}</span>
                </div>
              );
            })}
          </div>

          <div className="sidebar-divider"/>

          {!isParent && (
            <div className="sidebar-section">
              <div className="sidebar-section-title">My Progress</div>
              <div className="sidebar-item">
                <span className="sidebar-item-icon">📖</span>
                <div className="sidebar-item-text">
                  <div className="sidebar-item-name">Books Read</div>
                  <div className="sidebar-item-sub">{(profile.booksRead||[]).length} of {BOOKS.length}</div>
                </div>
              </div>
              <div className="sidebar-item">
                <span className="sidebar-item-icon">🏅</span>
                <div className="sidebar-item-text">
                  <div className="sidebar-item-name">Badges</div>
                  <div className="sidebar-item-sub">{(profile.badges||[]).length} earned</div>
                </div>
              </div>
              <div className="sidebar-item">
                <span className="sidebar-item-icon">⭐</span>
                <div className="sidebar-item-text">
                  <div className="sidebar-item-name">Perfect Quizzes</div>
                  <div className="sidebar-item-sub">{profile.perfectQuizzes || 0}</div>
                </div>
              </div>
            </div>
          )}

          <div className="sidebar-divider"/>

          <div style={{margin:'12px',borderRadius:'12px',background:'rgba(201,148,42,0.08)',border:'1px solid rgba(201,148,42,0.2)',overflow:'hidden'}}>
            <div style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:'8px',borderBottom:'1px solid rgba(201,148,42,0.15)'}}>
              <span style={{fontSize:16}}>📁</span>
              <div style={{fontFamily:'var(--font-ui)',fontSize:11,fontWeight:800,color:'var(--gold2)',letterSpacing:'1px'}}>DOWNLOAD STORIES</div>
            </div>
            {BOOKS.slice(0,6).map(book => (
              <div key={book.id} style={{padding:'9px 14px',display:'flex',alignItems:'center',gap:'8px',borderBottom:'1px solid rgba(201,148,42,0.08)',cursor:'pointer'}}
                onClick={() => downloadBookTxt(book)}>
                <span style={{fontSize:14}}>📄</span>
                <div style={{fontFamily:'var(--font-ui)',fontSize:10,fontWeight:700,color:'rgba(253,246,227,0.7)',flex:1,lineHeight:1.3}}>{book.title}</div>
                <button style={{fontFamily:'var(--font-ui)',fontSize:9,fontWeight:800,padding:'2px 6px',borderRadius:5,background:'rgba(201,148,42,0.2)',border:'1px solid rgba(201,148,42,0.3)',color:'var(--gold2)',cursor:'pointer'}}
                  onClick={e=>{e.stopPropagation();downloadBookTxt(book);}}>⬇ TXT</button>
              </div>
            ))}
          </div>
        </div>

        <div className="content">
          {screen === 'library' && !activeBook && (
            <Library profile={profile} onOpenBook={book=>{setActiveBook(book);setScreen('reader');}}
              activeCat={activeCat} setActiveCat={setActiveCat}/>
          )}
          {screen === 'reader' && activeBook && (
            <BookReader book={activeBook} profile={profile} username={username}
              onBack={()=>{setScreen('library');setActiveBook(null);voice.stop();}}
              onProfileUpdate={handleProfileUpdate}
              voice={voice}/>
          )}
          {screen === 'badges' && <BadgesScreen profile={profile}/>}
          {screen === 'parent' && <ParentHub allProfiles={allChildProfiles} onRefresh={()=>setRefreshTick(t=>t+1)}/>}
        </div>
      </div>

      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
