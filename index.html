<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Qisas-ul-Saliheen — Stories of the Righteous</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@400;600;700;800;900&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --parchment:#fdf6e3;
  --parchment2:#f5e6c8;
  --ink:#2c1810;
  --ink2:#4a3728;
  --gold:#c9942a;
  --gold2:#e8b84b;
  --teal:#1a6b6b;
  --teal2:#2a9090;
  --rose:#8b3a3a;
  --green:#2d6a4f;
  --blue:#1a4a7a;
  --muted:#7a6a5a;
  --border:#d4b896;
  --white:#fff;
  --shadow:rgba(44,24,16,0.15);
  --font-body:'Lora',Georgia,serif;
  --font-ui:'Nunito',sans-serif;
  --font-title:'Cinzel',serif;
}
html,body,#root{height:100%;margin:0}
body{font-family:var(--font-body);background:var(--parchment);color:var(--ink)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--parchment2)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pageFlip{from{opacity:0;transform:rotateY(-8deg) translateX(-20px)}to{opacity:1;transform:rotateY(0) translateX(0)}}
@keyframes starPop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.fade-up{animation:fadeUp 0.5s ease forwards}
.fade-in{animation:fadeIn 0.4s ease forwards}
.page-enter{animation:pageFlip 0.5s ease forwards}

/* ===== HEADER ===== */
.header{
  background:linear-gradient(135deg,#1a2a1a 0%,#2c1810 40%,#1a2a40 100%);
  padding:0 20px;
  min-height:64px;height:auto;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
  flex-shrink:0;position:relative;
  z-index:100;
}
.header::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9942a' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.header-logo{font-family:var(--font-title);font-size:19px;color:var(--gold2);font-weight:700;letter-spacing:1px;position:relative;white-space:nowrap;}
.header-logo span{display:block;font-size:9px;color:rgba(232,184,75,0.7);font-family:var(--font-ui);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.header-crescent{font-size:26px;animation:float 4s ease-in-out infinite;filter:drop-shadow(0 0 8px rgba(201,148,42,0.5));flex-shrink:0;}
.header-right{
  margin-left:auto;display:flex;align-items:center;gap:7px;
  flex-wrap:nowrap;padding:12px 0;flex-shrink:0;
}
.header-btn{
  padding:6px 12px;border-radius:18px;
  border:1.5px solid rgba(201,148,42,0.4);
  background:transparent;color:rgba(232,184,75,0.85);
  font-family:var(--font-ui);font-size:11px;font-weight:700;
  cursor:pointer;transition:all 0.2s;letter-spacing:0.2px;
  white-space:nowrap;flex-shrink:0;line-height:1.4;
}
.header-btn:hover,.header-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.user-badge{
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:18px;
  background:rgba(201,148,42,0.15);border:1px solid rgba(201,148,42,0.3);
  flex-shrink:0;
}
.user-badge-name{font-family:var(--font-ui);font-size:11px;font-weight:800;color:var(--gold2);white-space:nowrap;}
.user-badge-icon{font-size:15px;}

/* ===== LAYOUT ===== */
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.main-layout{flex:1;display:flex;overflow:hidden;min-height:0;}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;flex-shrink:0;
  background:linear-gradient(180deg,#2c1810 0%,#1a2a2a 100%);
  display:flex;flex-direction:column;
  border-right:2px solid var(--gold);
  overflow-y:auto;position:relative;
}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,var(--gold2),transparent);}
.sidebar-section{padding:20px 16px 8px}
.sidebar-section-title{font-family:var(--font-ui);font-size:9px;font-weight:800;color:rgba(201,148,42,0.6);letter-spacing:3px;text-transform:uppercase;padding:0 4px;margin-bottom:12px;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all 0.2s;border:1px solid transparent;margin-bottom:4px;}
.sidebar-item:hover{background:rgba(201,148,42,0.12);border-color:rgba(201,148,42,0.2)}
.sidebar-item.active{background:rgba(201,148,42,0.2);border-color:rgba(201,148,42,0.4)}
.sidebar-item-icon{font-size:20px;flex-shrink:0}
.sidebar-item-text{flex:1}
.sidebar-item-name{font-family:var(--font-ui);font-size:13px;font-weight:700;color:var(--parchment);line-height:1.2}
.sidebar-item-sub{font-family:var(--font-ui);font-size:10px;color:rgba(253,246,227,0.5);font-weight:600;margin-top:1px}
.sidebar-item-badge{font-family:var(--font-ui);font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;background:var(--gold);color:var(--ink);}
.sidebar-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(201,148,42,0.3),transparent);margin:8px 16px}

/* ===== MAIN CONTENT ===== */
.content{flex:1;overflow-y:auto;position:relative}

/* ===== AUTH SCREEN ===== */
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#1a2a1a 0%,#2c1810 50%,#1a2a40 100%);min-height:100vh;}
.auth-card{background:var(--parchment);border-radius:20px;padding:44px 40px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5);border:2px solid var(--gold);text-align:center;position:relative;overflow:hidden;}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));}
.auth-crescent{font-size:56px;display:block;margin-bottom:16px;animation:float 4s ease-in-out infinite}
.auth-title{font-family:var(--font-title);font-size:28px;color:var(--ink);margin-bottom:4px;font-weight:700}
.auth-subtitle{font-family:var(--font-ui);font-size:13px;color:var(--muted);font-weight:600;margin-bottom:6px;font-style:italic}
.auth-arabic{font-size:22px;color:var(--gold);margin-bottom:24px;direction:rtl;font-family:serif}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:var(--parchment2);border-radius:10px;padding:3px;border:1px solid var(--border)}
.auth-tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;font-family:var(--font-ui);font-size:13px;font-weight:800;cursor:pointer;color:var(--muted);transition:all 0.2s}
.auth-tab.active{background:var(--ink);color:var(--gold2);box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.auth-field{margin-bottom:12px;text-align:left}
.auth-label{font-family:var(--font-ui);font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block}
.auth-inp{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-family:var(--font-ui);font-size:14px;font-weight:700;color:var(--ink);background:var(--white);outline:none;transition:border-color 0.2s;}
.auth-inp:focus{border-color:var(--gold)}
.auth-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#2c1810,#4a3728);color:var(--gold2);font-family:var(--font-ui);font-size:15px;font-weight:900;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(0,0,0,0.3);margin-top:4px;letter-spacing:0.5px;}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.auth-err{color:#8b3a3a;font-size:12px;font-weight:700;margin-bottom:10px;padding:8px 12px;background:#fdf2f2;border-radius:8px;border:1px solid #e8b4b4;font-family:var(--font-ui)}
.auth-type-row{display:flex;gap:10px;margin-bottom:16px}
.auth-type-btn{flex:1;padding:12px;border-radius:12px;border:2px solid var(--border);background:var(--white);font-family:var(--font-ui);font-size:12px;font-weight:800;cursor:pointer;transition:all 0.2s;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:5px;}
.auth-type-btn.active{border-color:var(--gold);background:#fef9e7;color:var(--ink)}

/* ===== HOME / LIBRARY ===== */
.home-hero{background:linear-gradient(160deg,#1a2a1a 0%,#2c1810 50%,#1a2a40 100%);padding:48px 40px 56px;position:relative;overflow:hidden;}
.home-hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9942a' fill-opacity='0.05'%3E%3Cpath d='M40 0C17.9 0 0 17.9 0 40s17.9 40 40 40 40-17.9 40-40S62.1 0 40 0zm0 70C23.4 70 10 56.6 10 40S23.4 10 40 10s30 13.4 30 30-13.4 30-30 30z'/%3E%3C/g%3E%3C/svg%3E");}
.home-hero-inner{position:relative;max-width:700px}
.home-bismillah{font-size:28px;color:var(--gold2);margin-bottom:12px;direction:rtl;font-family:serif;display:block}
.home-title{font-family:var(--font-title);font-size:42px;color:var(--parchment);font-weight:700;line-height:1.1;margin-bottom:8px}
.home-title-gold{color:var(--gold2)}
.home-subtitle{font-family:var(--font-body);font-size:16px;color:rgba(253,246,227,0.75);font-style:italic;margin-bottom:20px}
.home-stats{display:flex;gap:20px;flex-wrap:wrap}
.home-stat{background:rgba(201,148,42,0.15);border:1px solid rgba(201,148,42,0.3);border-radius:10px;padding:10px 18px;font-family:var(--font-ui);}
.home-stat-num{font-size:22px;font-weight:900;color:var(--gold2)}
.home-stat-label{font-size:10px;color:rgba(253,246,227,0.6);font-weight:700;letter-spacing:1px;text-transform:uppercase}

/* Category tabs — FIX: scrollable, correct border handling */
.category-tabs{display:flex;gap:0;padding:0 32px;overflow-x:auto;flex-wrap:nowrap;background:var(--parchment);border-bottom:2px solid var(--border);}
.category-tabs::-webkit-scrollbar{height:0}
.cat-tab{padding:14px 20px;border:none;border-bottom:3px solid transparent;font-family:var(--font-ui);font-size:13px;font-weight:800;cursor:pointer;transition:all 0.2s;color:var(--muted);background:transparent;white-space:nowrap;display:flex;align-items:center;gap:6px;margin-bottom:-2px;}
.cat-tab:hover{color:var(--ink2);border-bottom-color:var(--border)}
.cat-tab.active{color:var(--ink);border-bottom-color:var(--gold);}

/* Book grid */
.books-grid-wrap{padding:28px 32px}
.books-grid-title{font-family:var(--font-title);font-size:18px;color:var(--ink2);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.books-grid-title::after{content:'';flex:1;height:1px;background:var(--border)}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:20px;}
.book-card{background:var(--white);border-radius:14px;border:1px solid var(--border);cursor:pointer;transition:all 0.25s;overflow:hidden;position:relative;box-shadow:0 2px 12px var(--shadow);}
.book-card:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(44,24,16,0.25);border-color:var(--gold)}
.book-cover{height:170px;position:relative;overflow:hidden;background:#0a1020;}
.book-cover svg{position:absolute;top:0;left:0;width:100%;height:100%;display:block;}
.book-cover-label{position:relative;z-index:2;font-family:var(--font-ui);font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.7);text-align:center;}
.book-card-body{padding:14px}
.book-card-category{font-family:var(--font-ui);font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.book-card-title{font-family:var(--font-body);font-size:15px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:6px}
.book-card-desc{font-family:var(--font-ui);font-size:11px;color:var(--muted);font-weight:600;line-height:1.5;margin-bottom:10px}
.book-card-footer{display:flex;align-items:center;justify-content:space-between}
.book-card-chapters{font-family:var(--font-ui);font-size:10px;color:var(--muted);font-weight:700}
.book-card-progress{height:4px;background:var(--parchment2);border-radius:2px;margin-top:8px;}
.book-card-progress-fill{height:100%;border-radius:2px;background:var(--gold);transition:width 0.5s ease}
.book-card-badge{position:absolute;top:10px;right:10px;font-family:var(--font-ui);font-size:9px;font-weight:800;padding:3px 8px;border-radius:8px;letter-spacing:1px;}
.book-card-badge.new{background:var(--teal);color:#fff}
.book-card-badge.done{background:var(--gold);color:var(--ink)}

/* ===== BOOK READER ===== */
.reader-wrap{max-width:860px;margin:0 auto;padding:32px 32px 60px}
.reader-back{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-ui);font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:color 0.2s;margin-bottom:24px;padding:6px 0;}
.reader-back:hover{color:var(--gold)}
.reader-header{margin-bottom:32px}
.reader-category{font-family:var(--font-ui);font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.reader-title{font-family:var(--font-title);font-size:34px;color:var(--ink);font-weight:700;line-height:1.2;margin-bottom:10px}
.reader-meta{font-family:var(--font-ui);font-size:13px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.reader-divider{height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin:20px 0;border:none}
.chapter-list{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:32px;box-shadow:0 2px 12px var(--shadow);}
.chapter-list-header{padding:16px 20px;background:linear-gradient(135deg,#2c1810,#1a2a2a);display:flex;align-items:center;gap:10px;}
.chapter-list-title{font-family:var(--font-title);font-size:14px;color:var(--gold2);font-weight:600;letter-spacing:1px}
.chapter-item{padding:16px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--parchment2);cursor:pointer;transition:all 0.2s;}
.chapter-item:last-child{border-bottom:none}
.chapter-item:hover{background:var(--parchment);padding-left:28px}
.chapter-item.active{background:#fef9e7;border-left:3px solid var(--gold)}
.chapter-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui);font-size:13px;font-weight:800;flex-shrink:0;}
.chapter-num.default{background:var(--parchment2);color:var(--ink2)}
.chapter-num.done{background:var(--gold);color:var(--ink)}
.chapter-num.active{background:var(--ink);color:var(--gold2)}
.chapter-info{flex:1}
.chapter-name{font-family:var(--font-body);font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.chapter-sub{font-family:var(--font-ui);font-size:11px;color:var(--muted);font-weight:600}
.chapter-status{font-size:18px;flex-shrink:0}

/* Story content */
.story-content{background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:0 4px 24px var(--shadow);overflow:hidden;margin-bottom:28px;}
.story-scene{width:100%;height:240px;position:relative;overflow:hidden;display:block;}
.story-scene svg{display:block;width:100%;height:100%;position:absolute;top:0;left:0;}
.story-scene-caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.65));padding:20px 24px 14px;font-family:var(--font-ui);font-size:12px;color:rgba(255,255,255,0.85);font-style:italic;font-weight:600;text-align:center;z-index:2;}
.story-chapter-header{padding:20px 28px 0;border-bottom:1px solid var(--parchment2);}
.story-chapter-num{font-family:var(--font-ui);font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.story-chapter-title{font-family:var(--font-title);font-size:22px;color:var(--ink);font-weight:600;padding-bottom:16px}
.story-body{padding:28px;font-size:16px;line-height:1.9;color:var(--ink2)}
.story-body p{margin-bottom:18px}
.story-body p:last-child{margin-bottom:0}
.story-pull-quote{border-left:4px solid var(--gold);padding:14px 20px;margin:20px 0;background:linear-gradient(90deg,#fef9e7,transparent);border-radius:0 8px 8px 0;font-style:italic;font-size:17px;color:var(--ink);font-weight:600;}
.story-highlight{display:inline;background:linear-gradient(120deg,rgba(201,148,42,0.2) 0%,rgba(201,148,42,0.15) 100%);border-radius:3px;padding:1px 3px;}

/* ===== INLINE STORY ILLUSTRATIONS ===== */
.story-illo{
  margin:28px -28px;
  position:relative;
  overflow:hidden;
  background:var(--parchment2);
  border-top:2px solid var(--border);
  border-bottom:2px solid var(--border);
}
.story-illo svg{display:block;width:100%;height:auto;}
.story-illo-caption{
  text-align:center;
  font-family:var(--font-ui);font-size:11px;font-weight:700;
  color:var(--muted);font-style:italic;
  padding:8px 20px 10px;
  background:var(--parchment2);
  border-top:1px solid var(--border);
  letter-spacing:0.3px;
}
.story-page-break{
  display:flex;align-items:center;gap:14px;
  margin:32px 0;
}
.story-page-break::before,.story-page-break::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
}
.story-page-break-icon{
  font-family:var(--font-ui);font-size:11px;font-weight:800;
  color:var(--gold);letter-spacing:2px;text-transform:uppercase;
  padding:4px 12px;border:1px solid var(--border);border-radius:20px;
  white-space:nowrap;
}
.lesson-box{margin:0 28px 28px;padding:24px;background:linear-gradient(135deg,#1a2a1a,#2c1810);border-radius:14px;position:relative;overflow:hidden;}
.lesson-box::before{content:'✨';position:absolute;top:16px;right:16px;font-size:24px;opacity:0.3;}
.lesson-box-title{font-family:var(--font-ui);font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gold2);margin-bottom:12px;}
.lesson-item{display:flex;gap:10px;margin-bottom:8px;font-family:var(--font-ui);font-size:13px;color:rgba(253,246,227,0.9);font-weight:600;}
.lesson-item::before{content:'📖';font-size:14px;flex-shrink:0;margin-top:1px}
.moral-box{margin:0 28px 28px;padding:20px 24px;background:linear-gradient(135deg,#fef9e7,#fdf0d0);border:2px solid var(--gold);border-radius:14px;text-align:center;}
.moral-box-title{font-family:var(--font-ui);font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.moral-text{font-family:var(--font-body);font-size:17px;font-style:italic;color:var(--ink);font-weight:600;line-height:1.5}
.story-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 28px;border-top:1px solid var(--parchment2);}
.story-nav-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;border:2px solid var(--border);background:var(--white);font-family:var(--font-ui);font-size:13px;font-weight:800;color:var(--ink);cursor:pointer;transition:all 0.2s;}
.story-nav-btn:hover{border-color:var(--gold);background:var(--parchment)}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Voice Engine ─────────────────────────────────────────────────────────────
function useVoice() {
  const [voiceOn, setVoiceOn]     = useState(() => localStorage.getItem('qisas_voice') !== 'off');
  const [speaking, setSpeaking]   = useState(false);
  const [paused, setPaused]       = useState(false);
  const [currentText, setCurrentText] = useState('');
  const [rate, setRate]           = useState(0.92);
  const utterRef = useRef(null);
  const voiceRef = useRef(null);

  // Pick best available voice on load
  useEffect(() => {
    function pickVoice() {
      const voices = window.speechSynthesis.getVoices();
      if (!voices.length) return;
      // Preferred order: warm female English voices
      const preferred = ['Samantha','Google UK English Female','Microsoft Zira','Karen','Moira','Tessa','Victoria','Alex'];
      for (const name of preferred) {
        const v = voices.find(v => v.name.includes(name));
        if (v) { voiceRef.current = v; return; }
      }
      // Fallback: any English voice
      voiceRef.current = voices.find(v => v.lang.startsWith('en')) || voices[0];
    }
    pickVoice();
    window.speechSynthesis.onvoiceschanged = pickVoice;
    return () => { window.speechSynthesis.onvoiceschanged = null; };
  }, []);

  const stop = useCallback(() => {
    window.speechSynthesis.cancel();
    setSpeaking(false);
    setPaused(false);
    setCurrentText('');
    utterRef.current = null;
  }, []);

  const speak = useCallback((text, onEnd) => {
    if (!voiceOn) return;
    window.speechSynthesis.cancel();
    // Strip HTML tags and clean up
    const clean = text.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
    if (!clean) return;
    setCurrentText(clean);
    setSpeaking(true);
    setPaused(false);
    const u = new SpeechSynthesisUtterance(clean);
    u.rate  = rate;
    u.pitch = 1.05;
    u.volume = 1;
    if (voiceRef.current) u.voice = voiceRef.current;
    u.onend = () => { setSpeaking(false); setPaused(false); setCurrentText(''); if(onEnd) onEnd(); };
    u.onerror = () => { setSpeaking(false); setPaused(false); setCurrentText(''); };
    utterRef.current = u;
    window.speechSynthesis.speak(u);
  }, [voiceOn, rate]);

  const togglePause = useCallback(() => {
    if (paused) { window.speechSynthesis.resume(); setPaused(false); }
    else        { window.speechSynthesis.pause();  setPaused(true);  }
  }, [paused]);

  const toggleVoice = useCallback(() => {
    const next = !voiceOn;
    setVoiceOn(next);
    localStorage.setItem('qisas_voice', next ? 'on' : 'off');
    if (!next) stop();
  }, [voiceOn, stop]);

  const cycleRate = useCallback(() => {
    const rates = [0.85, 0.92, 1.0, 1.1];
    setRate(r => { const idx = rates.indexOf(r); return rates[(idx+1)%rates.length]; });
  }, []);

  return { voiceOn, speaking, paused, currentText, rate, speak, stop, togglePause, toggleVoice, cycleRate };
}

// ─── VoiceBar component (sticky player shown while speaking) ──────────────────
function VoiceBar({ voice }) {
  const { speaking, paused, currentText, rate, togglePause, stop, cycleRate } = voice;
  if (!speaking) return null;
  const excerpt = currentText.length > 80 ? currentText.slice(0,80)+'…' : currentText;
  const rateLabel = rate === 0.85 ? '0.85×' : rate === 0.92 ? '0.92×' : rate === 1.0 ? '1×' : '1.1×';
  return (
    <div className="voice-bar">
      <div className="voice-waves">
        {[14,22,18,26,14].map((h,i) => (
          <div key={i} className={`voice-wave${!paused?' playing':''}`} style={{height:h, animationDelay:`${i*0.12}s`}}/>
        ))}
      </div>
      <div className="voice-bar-text">
        <div className="voice-bar-label">Now Reading</div>
        <div className="voice-bar-excerpt">{excerpt}</div>
      </div>
      <button className="voice-speed-btn" onClick={cycleRate} title="Change speed">{rateLabel}</button>
      <button className="voice-ctrl-btn primary" onClick={togglePause} title={paused?'Resume':'Pause'}>
        {paused ? '▶' : '⏸'}
      </button>
      <button className="voice-ctrl-btn" onClick={stop} title="Stop">⏹</button>
    </div>
  );
}

// ─── Voice toggle button for header — compact icon style ─────────────────────
function VoiceToggle({ voice }) {
  const { voiceOn, toggleVoice } = voice;
  return (
    <button
      className="header-btn"
      onClick={toggleVoice}
      title={voiceOn ? 'Voice reading ON — click to turn off' : 'Voice reading OFF — click to turn on'}
      style={{
        borderColor: voiceOn ? 'rgba(201,148,42,0.7)' : 'rgba(201,148,42,0.3)',
        color: voiceOn ? 'var(--gold2)' : 'rgba(232,184,75,0.5)',
        background: voiceOn ? 'rgba(201,148,42,0.12)' : 'transparent',
      }}
    >
      {voiceOn ? '🔊 Voice' : '🔇 Voice'}
    </button>
  );
}

// ─── Auth Helpers ─────────────────────────────────────────────────────────────
function getProfile(username) {
  try { return JSON.parse(localStorage.getItem('qisas_' + username)) || {}; } catch { return {}; }
}
function saveProfile(username, data) {
  localStorage.setItem('qisas_' + username, JSON.stringify(data));
}
function updateProfile(username, updates) {
  const p = getProfile(username);
  const np = { ...p, ...updates };
  saveProfile(username, np);
  return np;
}

// ─── Badge logic ──────────────────────────────────────────────────────────────
const BADGES = [
  { id: 'first-story', icon: '📖', name: 'First Story', desc: 'Read your first story', check: p => p.booksRead && p.booksRead.length >= 1 },
  { id: 'chapter-champ', icon: '⭐', name: 'Chapter Champion', desc: 'Score 100% on a chapter quiz', check: p => p.perfectQuizzes && p.perfectQuizzes >= 1 },
  { id: 'book-finisher', icon: '🏆', name: 'Book Finisher', desc: 'Complete all chapters of a book', check: p => p.booksCompleted && p.booksCompleted.length >= 1 },
  { id: 'three-streak', icon: '🔥', name: '3-Day Streak', desc: 'Read 3 days in a row', check: p => p.streak && p.streak >= 3 },
  { id: 'scholar', icon: '🌟', name: 'Scholar', desc: 'Complete 3 books', check: p => p.booksCompleted && p.booksCompleted.length >= 3 },
  { id: 'truth-seeker', icon: '🔍', name: 'Truth Seeker', desc: 'Read 2 different categories', check: p => {
    if (!p.booksRead) return false;
    const cats = new Set(p.booksRead.map(id => BOOKS.find(b=>b.id===id)?.category).filter(Boolean));
    return cats.size >= 2;
  }},
  { id: 'quiz-master', icon: '🎯', name: 'Quiz Master', desc: 'Complete 10 chapter quizzes', check: p => p.quizzesCompleted && p.quizzesCompleted >= 10 },
  { id: 'noor-award', icon: '💎', name: 'Noor Award', desc: 'Complete the entire library', check: p => p.booksCompleted && p.booksCompleted.length >= BOOKS.length },
];

function checkBadges(profile) {
  const earned = profile.badges || [];
  const newBadges = [];
  for (const b of BADGES) {
    if (!earned.includes(b.id) && b.check(profile)) {
      earned.push(b.id);
      newBadges.push(b);
    }
  }
  return { earned, newBadges };
}

// ─── Download Helper ──────────────────────────────────────────────────────────
function generateTxtContent(book) {
  let text = `QISAS-UL-SALIHEEN\nStories of the Righteous\n${'─'.repeat(50)}\n\n`;
  text += `${book.title.toUpperCase()}\nCategory: ${book.categoryLabel}\n\n${'─'.repeat(50)}\n\n`;
  for (const ch of book.chapters) {
    text += `Chapter ${ch.num}: ${ch.title}\n${'─'.repeat(40)}\n\n`;
    for (const para of ch.content) {
      text += para.replace(/<[^>]+>/g, '') + '\n\n';
    }
    text += `\n📖 What We Learned:\n`;
    for (const l of ch.learned) { text += `  • ${l}\n`; }
    text += `\n💎 Moral: "${ch.moral}"\n\n${'═'.repeat(50)}\n\n`;
  }
  return text;
}

function downloadBookTxt(book) {
  const blob = new Blob([generateTxtContent(book)], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = book.title.replace(/[^a-z0-9]/gi, '_') + '.txt';
  a.click();
}

// ─── Quiz ─────────────────────────────────────────────────────────────────────
function Quiz({ questions, onComplete, title, isChapter }) {
  const [cur, setCur] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const letters = ['A','B','C','D'];

  function pick(i) {
    if (answered) return;
    setSelected(i);
    setAnswered(true);
    if (i === questions[cur].answer) setScore(s => s+1);
  }
  function next() {
    if (cur < questions.length-1) { setCur(c=>c+1); setSelected(null); setAnswered(false); }
    else setDone(true);
  }

  if (done) {
    const pct = Math.round((score/questions.length)*100);
    const great = pct >= 80;
    return (
      <div className="quiz-results">
        <div className="quiz-results-icon">{great ? '🌟' : '📖'}</div>
        <div className="quiz-results-title">{great ? 'Wonderful!' : 'Good effort!'}</div>
        <div className="quiz-results-score">{score}/{questions.length}</div>
        <div className="quiz-results-sub">{pct}% — {great ? 'You really know this story!' : 'Keep reading to improve!'}</div>
        <div className="quiz-results-btns">
          <button className="results-btn primary" onClick={() => onComplete(score, questions.length)}>Continue Reading ›</button>
          <button className="results-btn secondary" onClick={() => { setCur(0); setSelected(null); setAnswered(false); setScore(0); setDone(false); }}>Try Again</button>
        </div>
      </div>
    );
  }

  const q = questions[cur];
  return (
    <div className="quiz-wrap">
      <div className="quiz-header">
        <div className="quiz-icon">📝</div>
        <div className="quiz-header-text">
          <div className="quiz-header-title">{isChapter ? 'Chapter Quiz' : 'Final Quiz'}</div>
          <div className="quiz-header-sub">{title}</div>
          <div className="quiz-progress-bar"><div className="quiz-progress-fill" style={{width:`${(cur/questions.length)*100}%`}}/></div>
        </div>
      </div>
      <div className="quiz-question-card">
        <div className="quiz-q-num">Question {cur+1} of {questions.length}</div>
        <div className="quiz-q-text">{q.q}</div>
        <div className="quiz-options">
          {q.options.map((opt,i) => (
            <button key={i}
              className={`quiz-option${selected===i?' selected':''}${answered && i===q.answer?' correct':''}${answered && selected===i && i!==q.answer?' wrong':''}`}
              onClick={() => pick(i)} disabled={answered}>
              <span className="quiz-option-letter">{letters[i]}</span>
              {opt}
            </button>
          ))}
        </div>
        {answered && (
          <div className={`quiz-feedback ${selected===q.answer?'correct':'wrong'}`} style={{marginTop:14}}>
            <span>{selected===q.answer?'✅':'❌'}</span>
            <span>{q.explain}</span>
          </div>
        )}
      </div>
      {answered && <button className="quiz-next-btn" onClick={next}>{cur<questions.length-1?'Next Question →':'See Results'}</button>}
    </div>
  );
}

// ─── BookReader ───────────────────────────────────────────────────────────────
function BookReader({ book, profile, username, onBack, onProfileUpdate, voice }) {
  const [curChapter, setCurChapter] = useState(0);
  const [mode, setMode] = useState('read');
  const [completedChapters, setCompletedChapters] = useState(profile.chaptersCompleted?.[book.id] || []);
  const ch = book.chapters[curChapter];
  const allDone = completedChapters.filter(c=>c!=='final').length >= book.chapters.length;

  useEffect(() => { window.scrollTo(0,0); if(voice) voice.stop(); }, [curChapter, mode]);

  function markChapterDone(chId) {
    if (completedChapters.includes(chId)) return;
    const nc = [...completedChapters, chId];
    setCompletedChapters(nc);
    const prev = getProfile(username);
    const booksRead = [...new Set([...(prev.booksRead||[]), book.id])];
    const chapMap = { ...(prev.chaptersCompleted||{}), [book.id]: nc };
    const booksCompleted = nc.filter(c=>c!=='final').length >= book.chapters.length
      ? [...new Set([...(prev.booksCompleted||[]), book.id])]
      : (prev.booksCompleted||[]);
    const { earned, newBadges } = checkBadges({ ...prev, booksRead, chaptersCompleted: chapMap, booksCompleted });
    const np = updateProfile(username, { booksRead, chaptersCompleted: chapMap, booksCompleted, badges: earned, lastRead: new Date().toISOString() });
    onProfileUpdate(np, newBadges);
  }

  function onChapterQuizDone(score, total) {
    const prev = getProfile(username);
    const qDone = (prev.quizzesCompleted||0) + 1;
    const perf = score===total ? (prev.perfectQuizzes||0)+1 : (prev.perfectQuizzes||0);
    const { earned, newBadges } = checkBadges({ ...prev, quizzesCompleted: qDone, perfectQuizzes: perf });
    const np = updateProfile(username, { quizzesCompleted: qDone, perfectQuizzes: perf, badges: earned });
    onProfileUpdate(np, newBadges);
    markChapterDone(ch.id);
    setMode('read');
    if (curChapter < book.chapters.length - 1) setCurChapter(c => c+1);
  }

  const catColor = CAT_COLORS[book.category] || '#2c1810';
  const SceneComp = SCENE_MAP[ch.scene] || SceneScroll;

  return (
    <div className="reader-wrap fade-in">
      <div className="reader-back" onClick={onBack}>← Back to Library</div>
      <div className="reader-header">
        <div className="reader-category" style={{color: catColor}}>{book.categoryLabel}</div>
        <div className="reader-title">{book.title}</div>
        <div className="reader-meta">
          <span>📚 {book.chapters.length} {book.chapters.length===1?'Chapter':'Chapters'}</span>
          <span>📖 {completedChapters.filter(c=>c!=='final').length}/{book.chapters.length} read</span>
          {allDone && <span style={{color:'var(--gold)',fontWeight:800}}>✅ Completed!</span>}
        </div>
        <hr className="reader-divider"/>
      </div>

      <div className="chapter-list">
        <div className="chapter-list-header">
          <span style={{fontSize:18}}>📜</span>
          <div className="chapter-list-title">Table of Contents</div>
        </div>
        {book.chapters.map((c,i) => {
          const done = completedChapters.includes(c.id);
          const active = i === curChapter && mode === 'read';
          return (
            <div key={c.id} className={`chapter-item${active?' active':''}${done?' done':''}`}
              onClick={() => { setCurChapter(i); setMode('read'); }}>
              <div className={`chapter-num${active?' active':done?' done':' default'}`}>{done?'✓':c.num}</div>
              <div className="chapter-info">
                <div className="chapter-name">{c.title}</div>
                <div className="chapter-sub">Chapter {c.num}</div>
              </div>
              <div className="chapter-status">{done?'✅':active?'▶️':'○'}</div>
            </div>
          );
        })}
        {allDone && (
          <div className={`chapter-item${mode==='final-quiz'?' active':''}`}
            onClick={() => setMode('final-quiz')}
            style={{background:'linear-gradient(90deg,#fef9e7,transparent)'}}>
            <div className="chapter-num" style={{background:'var(--gold)',color:'var(--ink)'}}>★</div>
            <div className="chapter-info">
              <div className="chapter-name">Final Quiz — All Chapters</div>
              <div className="chapter-sub">{book.quizQuestions.length} questions • Challenge round</div>
            </div>
            <div className="chapter-status">🏆</div>
          </div>
        )}
      </div>

      {mode === 'read' && (
        <div className="story-content page-enter">
          {/* Voice sticky bar */}
          {voice && <VoiceBar voice={voice}/>}
          <div className="story-scene">
            <SceneComp/>
            <div className="story-scene-caption">{ch.sceneCaption}</div>
          </div>
          <div className="story-chapter-header">
            <div className="story-chapter-num">Chapter {ch.num}</div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,paddingBottom:16}}>
              <div className="story-chapter-title" style={{paddingBottom:0,marginBottom:0}}>{ch.title}</div>
              {voice && voice.voiceOn && (
                <button className="voice-ctrl-btn primary" style={{flexShrink:0}}
                  onClick={() => {
                    const fullText = ch.content
                      .filter(item => typeof item === 'string')
                      .map(p => p.replace(/<[^>]+>/g,''))
                      .join('. ');
                    voice.speak(fullText);
                  }}
                  title="Read entire chapter aloud">
                  🔊
                </button>
              )}
            </div>
          </div>
          <div className="story-body">
            {ch.content.map((item,i) => {
              // Illustration block using named component map
              if (item && typeof item === 'object' && item.type === 'illo') {
                const IlloComp = item.illoKey ? ILLO_MAP[item.illoKey] : null;
                if (!IlloComp) return null;
                return (
                  <div key={i} className="story-illo">
                    <IlloComp/>
                    {item.caption && <div className="story-illo-caption">{item.caption}</div>}
                  </div>
                );
              }
              // Page break divider
              if (item && typeof item === 'object' && item.type === 'break') {
                return <div key={i} className="story-page-break"><span className="story-page-break-icon">{item.label || '✦'}</span></div>;
              }
              // Normal paragraph
              const para = typeof item === 'string' ? item : '';
              return (
                <p key={i} style={{position:'relative'}}>
                  <span dangerouslySetInnerHTML={{__html: para}}/>
                  {voice && voice.voiceOn && para && (
                    <button className="voice-para-btn"
                      onClick={() => voice.speak(para)}
                      title="Read this paragraph aloud">
                      🔊
                    </button>
                  )}
                </p>
              );
            })}
          </div>
          <div className="lesson-box">
            <div className="lesson-box-title">📖 What We Learned</div>
            {ch.learned.map((l,i) => <div key={i} className="lesson-item">{l}</div>)}
          </div>
          <div className="moral-box">
            <div className="moral-box-title">💎 Moral of the Story</div>
            <div className="moral-text">"{ch.moral}"</div>
          </div>
          <div className="story-nav">
            <button className="story-nav-btn" onClick={() => { if(curChapter>0){setCurChapter(c=>c-1);setMode('read');} }} disabled={curChapter===0}>← Previous</button>
            <div className="story-progress-dots">
              {book.chapters.map((_,i) => (
                <div key={i} className={`progress-dot${completedChapters.includes(book.chapters[i].id)?' done':i===curChapter?' current':''}`}
                  onClick={() => { setCurChapter(i); setMode('read'); }}/>
              ))}
            </div>
            <button className="story-nav-btn primary" onClick={() => setMode('quiz')}>Chapter Quiz →</button>
          </div>
        </div>
      )}

      {mode === 'quiz' && (
        <div className="story-content">
          <Quiz questions={book.quizQuestions.slice(0, Math.min(5, book.quizQuestions.length))}
            onComplete={onChapterQuizDone} title={ch.title} isChapter={true}/>
        </div>
      )}

      {mode === 'final-quiz' && (
        <div className="story-content">
          <Quiz questions={book.quizQuestions}
            onComplete={(s,t) => { markChapterDone('final'); setMode('read'); }}
            title={book.title} isChapter={false}/>
        </div>
      )}
    </div>
  );
}
